body:
  text: 引銀海精微二卷未知何人氏所撰著蓋餘生而目善病昔直掖垣余同寅友李沖涵公出以示余曰庶幾有當於目病方技乎余檢閲見其圖像立論及答問宗旨俱一一分晰明盡若嘗飲上池所視見者取名銀海本之道藏其為方書信乎精矣微矣數年宦遊所至每攜之笥中茲承乏河朔因檄所屬付欹劂蓋不欲祕之自私也雖然方亦未可盡拘泥也脈證有陰陽表裡虛實之異斟酌損益存乎其人不然拘泥古法而不通變則是編也真古人糟粕耳至易簡妙方則古宋陽裡子所授魯東門伯所修六物不竣外假而自稱絶技又是書所不載也賜進士第中憲大夫河南等處提刑按察司副使奉敕兵巡河北道前吏科左給事中北海齊一經書
