front:
  text: 序夫眼者乃五臟之精華如日月麗天昭明而不可掩者也其首尾赤眥屬心其滿眼白睛屬肺其烏睛圓大屬肝其上下肉胞屬脾而中間一點黑瞳如漆者腎實主之是隨五臟各有症應然論其所主則瞳子之關係重焉何以言之目者肝之外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏朦眩暈烏輪赤暈刺痛浮腫此肝熱也眼生清淚枯黃繞睛此肝虛也瞳仁開大淡白偏斜此腎虛也瞳仁焦小或帶微黃此腎熱也一虛一實以此驗之然人肝腎之氣相依而行孰知心者神之舍又所以為肝腎之副焉所謂一而二二而一者也何則心主血肝藏血血能生熱凡熱沖發於眼皆當清心涼肝又不可固執其水生木之説特眼者輕膜裹水照徹四方溯源返本非天一之水又果孰為主宰乎折而論之則拘急牽颼瞳青胞白癢而清淚不赤不痛是謂之風眼烏輪突起胞硬紅腫眵淚濕漿裡熱刺痛是謂熱眼眼昏而淚胞腫而軟上壅朦朧酸澀微赤是謂之氣眼其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有渺視胞垂雀目盲障之形淡紫而隱紅者為虛熱鮮紅而蠹赤者為實熱兩眥呈露生胬肉者此心熱血旺白膜紅膜如傘紙者此氣滯血凝熱症瞳仁肉壅白睛帶濕色浮而赤者也冷症瞳仁青緑白睛枯稿氣沉而濁也眼熱經久復有風冷所乘則赤爛眼中不赤但為痰飲所注則作痛肝氣不順而挾熱所以羞明熱氣蓄聚傷胞所以胞合此外症之大概然而五臟不可闕一脾與肺獨無預何也曰白睛帶赤或紅筋者其熱在肺上胞下瞼或目唇間如疥點者其熱在脾脾主味也五味之秀養諸中則精神發於外肺主氣也水火升降榮衛流轉非氣孰能使之前所以五臟各有症應於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛症亦不過以當歸地黃輩潤養之輕用溫藥不可也況乎肺能發燥肝亦好潤古方率用杏仁乾柿飴糖砂蜜為佐果非潤溢之意乎至於退翳一節尤關利害凡翳起於肺肺家受熱輕則朦朧重則生翳如珍珠如碎米者易散翳狀如梅花者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去赤熱則血為之冰而翳不能去矣其有赤眼涼藥與之過多又且滌之以水不反掌而水凝矣眼特一團水且水性清澄尤不可拘拘於點洗喜怒失節嗜欲無度窮役眼力泣涕過多凌寒衝風當暑月日不避煙火飲啖熱多此皆患生於臟腑者也專事點洗可乎哉有能靜坐澄神愛護目力放懷息慮心逸目休調和飲食以養之斟酌藥餌以平之明察秋毫斷可必矣
