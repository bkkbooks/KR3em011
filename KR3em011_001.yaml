body:
  text: 卷上五輪八廓總論人有兩眼猶如天地之有兩曜視萬物察纖毫何所不至日月有一時之晦者風雲雷雨之所致也眼之失明者四氣七情之所害也大抵目為五臟之精華一身之要系故五臟分五輪八卦名八廓五輪肝屬木曰風輪在眼為烏睛心屬火曰血輪在眼為二眥脾屬土曰肉輪在眼為上下胞瞼肺屬金曰氣輪在眼為白仁腎屬水曰水輪在眼為瞳仁至若八廓無位有名大腸之腑為天廓脾胃之腑為地廓命門之腑為火廓腎之腑為水廓肝之腑為風廓小腸之腑為雷廓膽之腑為山廓膀胱之腑為澤廓斯為眼目之根本而又借血為之胞絡或蘊積風熱或七情之氣鬱結不散上攻眼目各隨五臟所屬而見或腫而痛羞澀多淚或生障昏暗失明其症七十有二治之須究其源因風則散之熱則清涼之氣結則調順之切不可輕用針刀鉤割偶得其愈出乎僥幸或有誤而為者則必為終身之患也又不宜通用涼藥恐冰其血凝而不流亦成痼疾用藥當量人之老少氣體之虛實又有腎虛者亦令人眼目無光或生冷翳宜補暖下元滋補腎水北方患者多是日冒風沙夜臥熱炕二氣交蒸故使之用涼藥北方之人故與南方之人用藥有不同也疹痘之後毒氣鬱結於肝而氣不能瀉攻發於眼目傷於瞳仁者素無治法也五輪之圖眼中赤脈血輪心黑睛屬腎水輪深白睛屬肺氣輪應肝主風輪位亦輪更有肉輪脾臟應兩瞼屬脾胞胃侵五輪圖式大小眥為血輪屬心火大眥赤者心之實也小眥赤者心之虛也黑睛為風輪屬肝木瞳仁為水輪屬腎水白仁為氣輪屬肺金上下胞瞼為肉輪屬脾土八廓之圖肝為養化之廓腎與眼疾豈無由酒色過時更惜憂莫道睛光無大故看看膜障裹雙眸膽為清淨之廓視物依稀似霧中時時手拭兩睛瞳要知冷淚頻頻出此是肝虛膽氣攻膀胱津液之廓膀胱屬水腎為夫冷淚相形本臟虛赤脈縱橫輪廓內不逢妙手豈能蘇胃名水穀之廓飲食相干在胃中更加積熱兩相攻瞼胞漸腫生睛赤不解中宮熱不通命門抱陽之廓內抱真陽是命門眼前花發色紛紛不能補腎調肝氣睛腫縱橫似有根大腸傳送之廓傳送原因是本經肺家壅滯熱相侵只宣大腸依次第閉澀之時醫患睛小腸關泉之廓小腸腑屬關泉廓受病先從心裡傳兩眥皆赤生癢痛但調經脈自然痊腎屬會陰之廓視物如看霜霧多抬頭畏日事如何急宜補腎禁房室免使昏朦不得過八廓圖式天廓屬大腸傳送肺金乾卦火廓屬心抱陽命門經離卦地廓屬脾胃水穀之海坤卦水廓屬腎經會陰坎卦山廓屬膽經清淨艮卦風廓屬肝經養化巽卦雷廓屬心小腸經關泉震卦澤廓屬膀胱經津液兌卦六腑三焦膽胃大腸小腸膀胱五臟心肝脾肺腎心屬火肝屬木脾屬土肺屬金腎屬水五行生剋金生水水生木木生火火生土土生金金剋木木剋土土剋水水剋火火剋金五臟表裡心與小腸為表裡肝與膽為表裡脾與胃為表裡肺與大腸為表裡腎與膀胱為表裡三焦與命門為表裡一說命門與心胞絡為表裡三陰三陽經心是手少陰經小腸是手太陽經腎是足少陰經膀胱是足太陽經肺是手太陰經大腸是手陽明經脾是足太陰經胃是足陽明經肝是足厥陰經膽是足少陽經三焦是手少陽經命門是手厥陰經此是三陰三陽也七情喜怒憂思悲恐驚喜傷心其氣散怒傷肝其氣緊憂傷肺其氣聚思傷脾其氣結悲傷心胞其氣急恐傷腎其氣怯驚傷膽其氣亂此乃七情是也汗乃心之液淚乃肝之液涎乃脾之液唾乃肺之液精乃腎之液此五臟之液是也苦入心經酸入肝經甘入脾經辛入肺經鹹入腎經四氣酒色財氣風寒暑濕過度成病大眥赤脈傳睛赤脈傳睛之症起於大眥者心之實也此心邪之侵肝也心屬火主血肝屬木主筋筋得血灌引漸至黑睛蔓延瞳仁甚則看物如同隔絹是三焦相火炎上或勞心事太過或夜觀書史或能飲酒及好食五辛煎炒熱物法宜瀉火退熱老少不同治日積月纍筋脈大者宜用小鋒針挑斷毒血流出赤脈斷矣若是乍發赤脈不用針挑發點以陰二陽四藥服以四順八正當歸散涼肝之劑其病無不蘇矣又有暴橫之人赤脈灌睛者此生相也非比前症治之問曰人之患目大眥赤脈傳睛大眥常壅澀看物不準者何也答曰乃心經之實熱況心或因思慮勞神或飲食太過致使三焦發熱心火愈熾故目常赤也治之雖攻少陰經心胞陽火廓先服三黃丸瀉其心火次以洗心散去其病肝連丸常鎮三黃丸點用清源散服用清心利小腸經降火為主用八正散八正散大黃瞿麥木通梔子滑石甘草萹蓄車前子上各等分為末每服五錢水一鍾煎或入竹葉燈心蔥頭食後服導赤散木通甘草梔子黃柏生地黃知母上每服細末四五錢水一鍾入竹葉燈心草同煎食後服七寶洗心散當歸赤芍大黃各一兩麻黃二兩荊芥五分黃連一兩梔子上為末每服三四錢水煎食後服三黃丸黃連黃芩各一兩大黃三兩酒浸過炒上為末煉蜜為丸如桐子大每服三十丸熱水下肝連丸白羊子肝一付勿令下水以線結定總筋吊起高處濾乾血水輕輕刮去外膜可將肝置於平木板上以竹刀割下肝粉筋膜不用肝粉和為丸每服五十丸茶送下小眥赤脈傳睛小眥赤脈傳睛者心之虛也與大眥不同治法分二症治之五臟之主六腑之宗且屬南方候陽象德之君火生土火乃土之母脾土實則心火虛矣治先瀉其脾土之實後補其心之虛多因夜近燈火勞傷心經致使心虛氣弱血運不行積在小眥之間故引此二者以為後之學者識然此症宜吃藥不必挑剪瀉肝散桔梗黃芩大黃芒硝梔子車前子九仙散黃芩荊芥甘草赤芍藥菊花川芎當歸木通白芷上等分為末每服三錢用水煎食後服駐景丸治心腎俱虛血氣不足下元衰憊服楮實微炒枸杞子五味子人參各一兩熟地酒浸焙乾二兩乳香一兩制過肉蓯蓉酒浸焙乾四兩川椒去目炒乾一兩菟絲子淘淨去沙土酒浸三宿蒸過焙乾四兩一方加當歸上為末煉蜜為丸梧桐子大每服三十丸空心鹽湯下補勞人參丸治心神恍惚人參白茯苓白附子續斷遠志菊花甘草上為末煉蜜為丸彈子大每服一丸細嚼食後桔梗湯下日三次補虛人參丸茯苓人參續斷遠志各一兩白附子三錢甘草白殭蠶各五錢上為末煉蜜為丸如彈子大每服一丸細嚼桔梗湯送下胬肉攀睛胬肉攀睛者與大眥赤脈之症同然此症者脾胃熱毒脾受肝邪多是七情鬱結之人或夜思尋家筵無歇或飲酒樂欲致使三焦壅熱或肥壯之人血滯於大眥胬肉發端之時多癢因乎擦摩胬肉漸漸生侵黑睛日積月纍者為實乍發乍痛者為虛治法實者小鉤為鉤鉤起剪斷些寬三五日剪痕收滿方可點陰二陽四藥吹點余翳漸清避風忌口齊戒可也若乍發不宜鉤剪宜服藥點以淡丹藥可也三焦心火俱炎亦能生此疾治之須鉤割後宜服瀉脾除熱飲瀉脾除熱飲黃耆防風茺蔚子桔梗大黃黃芩黃連車前子芒硝各一兩每服六錢水煎服此症脾胃積熱相火胃火旺也若經久翳厚施實烏睛者宜鉤剪剪訖次日用退翳捲雲散調津液點之日一次三黃湯加寒劑常點用對交丹加清涼散若筋腫厚大者宜剪剪畢頭處用火烙之使其再不復生愈後仍用三黃丸收功鎮其上炎之火三黃湯治脾胃積熱致生此症宜服加芍藥宣連黃連黃芩大黃各一兩若熱甚者脈紅盛者加黃柏石膏山梔子之類水煎食後溫服金花丸黃連黃柏各四兩黃芩人參各三兩桔梗三兩半半夏二兩梔子仁二兩上為末煉蜜為丸梧桐子大每服五十丸茶下雞冠蜆肉雞冠蜆肉者心之熱酒之毒也脾胃壅滯肝臟積熱肉翳漸漸而長侵至黑睛發來高大形似雞冠蜆肉壅蔽大眥皆因相火胃火鬱結致生紅肉磣澀淚出治法初發之時用小鋒針破使惡血流出以輸其肉二三日又可針一次又法可鼻孔內剪竹葉卷作一小筒彈進放血或小鋒針亦可右眼右孔左眼左孔服三黃加朴硝丸如彈子大夜臥噙化以沃上焦火正謂揚湯止沸莫如去薪息火肉翳者可烙三五度其效甚速烙可用軟皮剪孔濕按眼眶烙則不傷四弦眥肉有虛有實虛切不可用剪剪則流血汪汪變為利害或壅如桃李之狀難治問曰眼內生虛肉形似雞冠蜆肉者何也脾胃受風熱火旺脾土燥熱也治法年少者只宜瀉脾胃本臟若脾胃衰不受寒涼者宜瀉子瀉母之法瀉本臟用三黃湯加寒涼劑瀉子用瀉肺湯瀉母用八正散瀉心湯主之點用清涼散加涼藥仍服三黃丸收功若積久大者亦宜剪剪後宜烙新發小者宜挑不用烙宜用退翳捲雲散點之一二次三黃丸八正散二方前症條下瀉肺湯治肺經得脾熱白仁變生雞冠蜆肉宜服桑白皮一兩去皮地骨皮一兩去骨甘草七錢黃芩一兩桔梗一兩上為末每服三四錢水煎食後服瀉心湯治心熱傷脾土燥熱宜服大黃黃芩桔梗知母黑參馬兜鈴防風上等分水煎食後服兩瞼黏睛兩瞼黏睛者脾胃風虛冷弱邪氣聚於瞼致胞瞼風赤濕爛肝膈虛熱眵黏四眥夜睡上下胞瞼膠凝黏緊血滯不散久則漸生翳膜治法宜陰一陽三吹點若發年久眼皮漸長雖不是拳毛倒睫亦可夾起眼皮使露黑睛消散血氣瞼積有瘀血可劆可洗爛癢者洗以碧天丹每日侵晨用桑白皮入鹽熏洗或大寒後不落桑葉名為鐵扇子煎洗極妙或菊花葉煎湯洗亦可此乃發年久有此症初發者無此病症耳問曰眼患年久兩瞼黏而不開明者何也答曰脾胃受風冷所傷邪氣久積不散致血氣凝滯久注不開時自眵淚含糊治法年久宜當歸活血煎神清散主之近患蟬花散密蒙花散主之若經久不愈久注不開眼皮長者雖不是拳毛倒睫亦可夾起眼皮點用重藥片腦不用久患虛冷當歸活血煎治風冷久積兩瞼黏眼服之當歸黃耆沒藥川芎血氣旺者勿用蒼朮荊芥薄荷熟地黃羌活菊花麻黃上等分為末煉蜜為丸如彈子大每食後細嚼一丸清茶送下日進三次久受風邪神清散治風毒傷胞瞼眼生翳膜日漸細小服之川芎薄荷羌活附米藁本防風荊芥川烏枳殼石膏白芷甘草細辛麻黃各等分上為末每服三四錢食後清茶蔥白湯送下無疼痛時蟬花散治肝經蘊積熱毒傷肝上攻於目赤腫多淚羞明一切風毒傷肝並皆治之穀精草去土菊花蟬蛻羌活甘草蔓荊子蒺藜草決明防風川芎梔子仁密蒙花黃芩荊芥穗木賊上各等分為末每服二錢食後用清茶調服或荊芥湯調服無痛有羞明時密蒙花散治眼羞明怕日肝膽虛損瞳仁不清服之密蒙花羌活菊花蔓荊子青葙子木賊石決明蒺藜枸杞子上各等分為末每服三錢食後清茶送下脾胃虛者加白朮五分眵淚黏濃問曰眵淚黏濃出而不絶者何也答曰此肺之虛也肺受心火之邪熱所克金得心火而衰故眵淚而不絶也宜先服艾煎丸以去肺與大腸經天廓之邪熱後用阿膠散而補之艾煎丸好艾葉醋蒸焙乾薄荷當歸地骨皮晚蠶沙即蠶屎糯米秦艽黃柏桔梗綿黃耆上為末煉蜜為丸每服十五丸食後服桑白皮湯下或薄荷湯下阿膠散阿膠蛤粉炒一兩鼠黏子炒一兩甘草五錢糯米一兩馬兜鈴款冬花紫菀各一兩上為末每服六錢水煎服眵淚淨明問曰人患眼白仁常淚紅壅熱眵淚出而不絶者何也答曰此肺之實熱也肺屬金金生水金旺則水溢淚本通肝亦是肺之精華肺經實熱故目眵淚出而不絶也治之須用瀉肺湯瀉肺經之實熱後用省味金花丸治其肺火則與大腸傳導流利而天廓目經於度無上炎之火眵淚淨明矣瀉肺湯地骨皮大黃芒硝桔梗甘草各一兩上每服五錢水煎省味金花丸川黃柏二兩黃芩知母桔梗連翹各一兩地骨皮薄荷五錢上煉蜜為丸每服五十丸桑柏皮湯下或薄荷湯下蠅翅黑花問曰人之患眼目有黑花芒芒如蠅翅者何也答曰此腎水衰腎乃肝之母腎水不能濟於肝木則虛熱膽乃生於肝之侵肝木枯焦膽氣不足故行動舉止則眼中神水之中蕩漾有黑影如蠅翅者治之須用豬苓散順其肝腎之邪熱次用黑參湯以涼其肝則膽經清淨之廓無邪熱之所侵後用補腎丸黑花自消豬苓散木豬苓一兩車前子五錢木通大黃梔子黑狗脊滑石萹蓄各一兩蒼朮上為末每服三錢鹽湯下黑參湯黑參黃芩生地黃赤芍藥菊花青葙子白蒺藜上為末每服四錢水煎服補腎丸石菖蒲枸杞子白茯苓人參山藥澤瀉菟絲子肉蓯蓉各一兩上煉蜜為丸每服五十丸鹽湯下目暗生花與坐起生花不同目暗生花不能久視者何也此乃腎之虛也眼雖屬於竅門乃歸腎而為主腎虛則眼昏或貪淫樂欲酒色過度使腎臟衰憊稟受天真不全精神短少致瞳仁神水不清眼目無力故目生花不能久視治之須用還精補腎丸使陰水足無不還矣還精補腎丸人參白朮茯苓蒺藜羌活木賊菊花防風甘草川芎山藥肉蓯蓉密蒙花青葙子牛膝各一兩菟絲子上為細末煉蜜為丸或煎服亦妙熱極眵睛眼目熱極珠磣淚出者也此陰陽不和五臟壅熱肝膈毒風上充忽然腫痛難忍五輪振起乃五臟熱極致使也宜服救睛散次用涼膈連翹散先點清涼散次用九一丹救睛散川芎防風羌活甘草木賊石膏薄荷菊花石決明上為末每服三錢清茶下涼膈連翹散連翹大黃黃連各二兩薄荷梔子甘草黃芩朴硝各一兩上水煎服胞肉膠凝胞肉膠凝與兩瞼黏睛頗同兩瞼黏睛瞼之病此症胞之病瞼熱則眵黏病之淺胞熱則膠黏病之深故分作兩症治之脾胃壅熱肝膈風充瞼胞內蠹肉壅起爛濕眵黏膠凝氣血壅滯不能疏散積之年久黑睛生翳朦昧不明羞明怕日治法以陰二陽四吹點有瘀血可劆洗以桑白皮鐵扇子菊花當歸防風荊芥木賊薄荷鹽花之類胞肉積久堅硬厚實者番轉烙二三度而實其肉可也問曰眼久注不開內生虛肉眵淚膠凝者何也答曰胃中有伏熱鬱於內也治宜通脾瀉胃湯加寒劑降火涼血去風宜點堅藥內肉結厚實者宜劆洗至肉平淨方止堅厚者亦烙無妨烙後清涼消毒膏敷之通脾瀉胃湯麥門冬茺蔚子防風大黃知母天門冬黃芩熱甚者加黃柏石膏朴硝梔仁一方又加黑參上等分為末每服五錢水煎食前服胞肉生瘡胞肉生瘡與胞肉膠凝瞼生風粟兩瞼黏睛四症大同小異此皆上胞下瞼之病然中間分析治法各有輕重深淺劆洗針烙不同胞肉生瘡者此脾胃熱毒胞肉疙瘩或風粟變而為瘡血熱化膿腐爛煋臊流汁流膿浸漬黑睛生翳眼如硃砂之色此症雖少不可不知治用陰二陽十藥日月桑白皮煎湯入枯礬鹽化番轉眼皮以鴿翎刷洗有瘡處以血竭乳香沒藥輕粉密陀僧或有瘡處烙二三下無妨問曰胞肉生瘡礙澀睛珠者何也答曰胃得心熱也治宜泄心火解胃熱用八正散三黃湯之類痛者用沒藥散有瘡處仍用劆洗點以清涼及重藥肉虛者宜烙外用清涼消毒膏敷之八正散在前大眥赤脈條下三黃湯在前胬肉條下血滯痛甚服沒藥散治心脾胃得熱致胞肉生瘡宜服大黃多用真血竭破積血止痛去赤沒藥少朴硝多上照多少加減為末每服二三錢食後用清茶調下瞼生風粟瞼生風粟者瞼間積血年久致生風粟與眵黏症同眵黏者無風粟故又作一症胞者上胞也瞼者下瞼也此脾胃壅熱致令胞瞼之間漸生風粟如米甚如楊梅之狀摩擦瞳仁黑睛有翳治法番轉瞼風粟逐個用鋒針密針三五度亦烙更妙睛有翳者用陰三陽五藥吹點二三夜吹一次忌口動風動血之物莫吃可也問曰下瞼生風粟如楊梅之狀者何也答曰脾得邪熱血滯不行致生風粟紅蠹不平宜劆洗脾熱用瀉脾湯久患宜烙點用清涼可也瀉脾湯人參黃芩大黃桔梗白茯苓芒硝茺蔚子二兩白芍藥一兩黑參兩半細辛白芷各一兩上各等分加減每服四五錢水煎服天行赤眼天行赤眼者謂天地流行毒氣能傳染於人一人害眼傳於一家不論大小皆傳一遍是謂天行赤眼腫痛沙澀難開或五日而愈此一候之氣其病安矣治法此症再不可劆洗只用童子小便煎黃連露宿溫洗日進五遍以解惡毒之氣更用胡宣二連礬雄黃共研細調薑汁點二眥通其惡淚其痛立止或酒調散服之二三貼無妨此症只氣候瘴毒之染雖腫痛之重終不傷黑睛瞳仁也問曰一人患眼傳於一家者何也答曰天時流行瘴毒之氣相染治宜解毒涼血清熱痛甚者服用洗肝散七寶洗心散點用清涼散加解毒但此症與內無損極甚者二七不療自愈切不可劆洗去血洗肝散治暴發赤腫天行赤眼時常眼痛宜服大黃梔子防風薄荷川芎當歸羌活甘草上一兩為末食後熱水調二三錢服之七寶洗心散方在大眥赤脈條下大患後生翳大患後生翳者與天行赤眼同一症也何分兩症治之天行赤眼只一候或七日愈矣雖同無生翳之患大患者初起陡然而起腫痛發來甚重沙澀難忍增寒作熱坐臥不安或通夜行至達旦羞明怕日淚出如湯鼻涕溏流兩眼腫起如桃日夜呻吟飲食無味二七不愈遂生翳如黃膿疥瘡占在風輪其腦牽痛治宜用胡宣二連藥照前研細調薑汁點用苦桃葉側柏葉菊葉柳葉熏洗服宜四順八正導赤散雖療痊可赤昏昧三個月方得復舊失於調治喪明必矣問曰天行赤眼後生白翳者何也答曰邪氣甚傷經絡也外邪甚則傷肝肝受傷則生翳治宜四順散細辛湯點用熊膽膏翳厚者用九一丹點四順湯治經絡得熱大患後生翳宜服大黃當歸甘草赤芍藥上各等分每服四五錢水煎食後服細辛湯治風邪傷肝致眼生翳茺蔚子黑參黃芩桔梗大黃車前子木通生地黃甘草上各等分水煎食後服暴露赤眼生翳暴露赤眼生翳者與天行赤眼同理天行赤眼者能傳染於人暴露赤眼但患於一人而無傳染之症天行者雖痛腫而無翳暴露者痛而生翳故此有別治法即其所因量其老少虛實熱則清涼之氣結則調順之此眼縱有瘀血切不可劆洗亦不可峻補藥宜酒煎散發散內有麻黃蒼朮或大黃當歸散疏通血氣點以淡藥九一丹如翳厚珍珠散點之洗以黃連當歸防風菊花側柏赤芍藥薄荷荊芥之類酒煎散漢防己防風甘草荊芥當歸赤芍藥牛蒡子干菊花上各等分酒煎食後溫服大黃當歸散治眼壅腫瘀血凝滯不散攻發生翳服當歸酒浸二錢菊花三錢大黃酒蒸黃芩各一兩紅花炙用蘇木梔子酒炒木賊上水煎食後服暴風客熱暴風客熱與暴露赤眼同也暴露者肝心二經病也故赤而痛致黑睛生翳暴露客熱者肝肺二經病故白仁生虛翳四圍壅繞朝伏黑暗凹入白仁紅翳壅起痛澀難開故分暴露與暴風有別之症暴者乍也驟也陡然而起治法疏通退熱涼膈瀉肝增減酒調之劑發散風熱俗云熱眼忌酒孰知酒能引血藥無酒不能及於頭目也此眼不可劆洗不可點涼藥暴客之邪來之速去之亦速耳非比五臟六腑蘊積發歇不時之症同俗為傷寒眼也問曰白仁壅起包小烏暗疼痛難開者何也此時肺經受毒風不散久則發熱攻入眼中致令白睛浮腫名曰暴風客熱宜服酒調散補肝湯用搜風煎洗服瀉肝散治眼發歇不時羌活黃芩黑參各兩半桔梗大黃芒硝地骨皮各一兩上每服六錢水煎服補肝湯藁本一兩白芷車前子石決明天麻赤芍藥防風細辛各一兩上每服二錢水湯調下搜風散洗眼治眼中有黑花陳皮秦艽防風細辛各一兩黃連木香各五錢上為末水一鍾浸一宿去渣入龍腦一錢蜜四兩浸火熬成膏點之不用蜜煎湯熏亦可又以當歸活血煎主之腫痛甚亦用雙解散酒調散發表之點用重藥加姜粉以辛散之雙解散防風川芎歸尾赤芍藥大黃麻黃薄荷連翹芒硝黃芩桔梗石膏滑石荊芥甘草山梔白朮實者去之上等分水煎食後溫服如暴發加蔥三根風甚眼痛桑螵蛸酒調散治眼紅腫有血翳壅腫服之當歸甘草大黃赤芍藥菊花蒼朮桑螵蛸羌活黃麻茺蔚子上各等分用水煎食後加酒溫服如熱甚加大黃朴硝或為末溫服酒調服三錢痛如神祟痛如神祟舊無根基只依痛甚怪異或日痛而夜愈或夜痛而日愈如艾之灸針之刺忽來忽往無蹤無跡號曰痛如神祟豈有神祟為禍而害眼孰知陰陽偏勝動靜氣血攻擊使然亦有信巫之地因所禱厭痕作福而愈者有之孰知病勢將除偶因而愈曰神祟眼非也治法痛時只將艾蔥尉之服酒煎散一二貼住痛點以時藥洗以歸尾白芷防風芍藥川芎生地黃止痛散血可也問曰眼內不紅不赤不腫乍痛如神祟者何也答曰陰陽升降不和氣血偏勝相攻使然或有血虛者下午痛或有氣旺太甚者上晝痛下晝痛者宜服助陽和血湯上晝痛者宜服酒調洗肝散明目流氣飲點清涼之藥又有一樣眼時時痛如針刺此是新血與舊血相攻擊治法亦同血氣虛服助陽和血湯治血氣不調如神祟痛如針刺服之蔓荊子三分香白芷三分柴胡黃耆升麻各四分炙甘草當歸身酒浸防風各五分上作一帖水一鍾半煎八分溫服臨避風處睡可也又並渣服熱氣攻痛酒調洗肝散治眼熱氣上攻無時黑睛痛者服之黑參大黃桔梗知母朴硝梔子黃芩熱甚者加生地歸尾之類上為末每服二三錢溫酒調下日服二次熱氣鬱結明目流氣飲治氣鬱眼目赤腫服之菊花細辛大黃牛蒡子川芎蒺藜荊芥玄參甘草蔓荊子防風梔子黃芩木賊蒼朮草決明上各等分水煎食後服痛如針刺眼痛如針刺者即是神祟症中如艾之灸如針之刺痛同然此症皆因心臟潛伏熱毒風壅在於膈間目眩頭痛眼系常急欲臥澀痛淚出難開時時如針刺相似急服瀉心湯八正散之劑口噙水㗜以雄黃散正其頭點以時藥消散血氣洗以側柏葉防風荊芥薄荷黃連生地黃之類黑睛有星如釘之釘凹進痛如針刺點以淡藥可也瀉心湯方在前雞冠蜆肉症內八正湯方在前胞肉生瘡症內傷寒熱病後外障傷寒熱病外障者蓋由大病新瘥出早形骸羸瘦臟腑未實氣血尚虛陰陽偏勝未復縱口多毒五辛油膩煎炒一切熱物之類蓄積諸毒衆聚停留於內熱邪必表於外攻衝於眼眼者五臟六腑之精華其症各現於五輪此症發時赤腫淚出痛澀難開瞳仁闊大黑花繚亂不能遠視此血虛也治法點以時藥洗以散風前症活血之藥不宜劆洗只平補臟腑損其有餘益其不足是為活法也宜忌三兩月可也問曰兩目或發腫痛者何也答曰氣血不足虛陽攻上故也此症縱有疼痛切不可服瀉藥涼藥只宜和解之痛腫甚者明目細辛湯熊膽丸地黃湯之類點三七丹腦射不用又不可劆洗風熱作痛明目細辛湯治熱病後患腫痛大便結羞明服生地黃川芎蔓荊子歸尾白茯苓藁本荊芥麻黃根防風羌活川椒細辛密蒙花上各等分食後溫服日一次熊膽丸治肝膽得熱火邪為病用清熱解毒熊膽一個石決明車前子澤瀉細辛各一兩乾地黃茺蔚子牛膽一個龍膽草上為細末煉蜜丸如梧桐子大每服四十九丸食後溫酒送下地黃湯治眼久病昏澀因發而久不愈宜服防風羌活人參白茯苓當歸熟地黃黃連黃芩上各等分水煎溫服風牽出瞼風牽出瞼者脾胃受風壅毒出胞瞼之間瞼受風而皮緊脾受風則肉壅此皮緊肉壅風牽出瞼淚出汪汪無分四季此土陷不能堤水也水漬於瞼濕爛之狀治法先用摩風膏刮散脾外風邪塗以白斂膏消散風毒翻轉瞼皮烙三五度無妨此症一年半載易治若年久肉堅難治若眼有紅筋貫上黑睛有翳有膜吹以丹藥癢塌洗以碧天丹藥此症大抵眼弦之病也此症大風瘷䕸之人面部所牽多受此病症難以調治故名風牽出瞼問曰下瞼翻出久不收淚出汪汪者何也答曰脾經受風邪所傷致土壤不能堤水也治法肉堅厚者用火烙三五度至皮轉為度服用夜光柳紅丸外用摩風膏摩擦之點用重藥少加涼夜光柳紅丸治風邪傷胞瞼致風牽出瞼不收宜服人參川芎荊芥白芷川烏火煨南星石膏各二兩石決明草烏去火溫炮少用藁本雄黃細辛當歸蒲黃蒼朮浸炒防風薄荷藿香全蠍各二兩何首烏一兩羌活三兩甘松二兩上為末煉蜜為丸每服三十丸茶清下摩風膏治胞瞼受風或疼痛諸痛處可摩可貼木香當歸白芷防風細辛藁本黑附子沒藥骨碎補各一兩川烏赤芍藥肉桂各一兩豬脂牛酥鵝脂各四兩上為末香油八兩浸一日次一日沙鍋內熬入牛酥鵝脂同熬成以手摩擦按有瘡處或半身不遂用砂弓刮之使風氣散去風牽喎斜風牽喎斜者雖與風牽出瞼同喎斜者脾胃虛房事不節脾胃有毒夜臥多痰或醉飽坐臥當風貪涼左右忽受風牽喎斜眼內赤癢時時顫動其眼血絲四起瞳仁不開大視物濛濛甚至半身不遂治法急用摩風膏擦摩面部更以砂弓刮所患風一邊手臂通刮或通身亦可刮一日一遍用大瓷青碗搗碎入磁石多寡搜麵糊為餅烘熱貼面對鼻一邊右喎貼左左喎貼右貼至扯口眼正其藥取起又可灸頰車耳門穴開口取之太陽人中承漿喎左灸右喎右灸左近患者易治若年久難治問曰目睛斜視倒目者何也答曰肝經受風邪所牽使其筋緩縮不利治法宜灸火發散風邪以加全蠍白附子南星半夏夜光柳紅丸外用摩風膏導引發散目睛必轉灸火穴太陽頰車耳門聽會耳尖風池各一穴夜光柳紅丸方在前篇針症內摩風膏方亦在前症內被物撞破被物撞破者並無所患而所因者三此外因也全然無事誤被物撞破或打撲或跌著或撞破傷胞瞼也積血紫青撞破白仁外控硬殼此不能為害惟撞破三風輪血灌瞳仁五並輪混雜最為利害之症也痛惡瞳忍澀難開治法服以酒調散尉以蔥艾或專以生地黃搗爛作餅烘熱貼一日一換以散其血如無生地黃用芙蓉葉無葉用根去泥粗皮用白皮搗爛烘熱貼亦可若眼眶青黑搗生蘿蔔護貼切宜將息避風忌口動風動血之物諸般母肉莫吃新撞者易治若撞久血凝不散無痛者難治也問曰並無所患誤被物撞破或生翳者何也答曰外傷也與內無損治法初起者宜散血為主痛甚者沒藥散止之若至血散變生白翳為不治之症也沒藥散方在前胞肉生瘡內撞刺生翳被物撞刺生翳者與撞破一理然刺被竹木簽刺痕傷受血灌溉遂生血翳磣澀淚出紅筋滿目此症外傷與患眼生翳不同患眼者五臟六腑之毒發出為有根病也刺傷者外傷與內無預治法與同症同寬一七之後痕變成翳可用輕丹少少吹點忌淫欲嗔怒避風將息失於調治潰痛發腫傷於風輪釀成大患或至瞎進無治法也血灌瞳人血灌瞳仁者因毒血灌入金井瞳仁水內也猶如水流入井中之狀清濁相混時痛澀紅光滿目視物濛濛如隔絹看物若煙霧中然先患一隻後乃相牽俱損此症有三肝症血熱日積月纍灌入瞳仁血凝入水此關乎肝腎二經病也此血難退撞破之血鮮而熱灌雖甚退之速又有開金針失手撥著白仁亦有瘀血灌入瞳仁舉此三症治法頗同亦用大黃當歸散沒藥散墜翳明目丸前被物刺破及撞刺生翳並血灌瞳仁皆可服前藥三料其效甚大或生地黃芙蓉根搗爛每貼三症通呼用之或蔥艾尉亦可或可方而或可圓活法而行不可拘執其方焉而獲功哉問曰人患眼目無內患忽因物刺著胞瞼睛珠血積不散或瘀血灌入瞳仁或用針誤損惡腫痛難忍或因惡拳打著睛珠脫出一二分者將何治法答曰打傷之時搗爛生地黃敷之以散其血先服止痛末藥散後服墜翳明丸若因傷風服除風湯若打著睛珠流出者以手掌心搽進珠亦以生地黃敷之若無生地黃用乾地黃酒浸濕搗爛亦可服止痛沒藥散沒藥散沒藥血竭大黃朴硝上為末每服二錢酒調下茶下亦可墜翳明目丸石決明川芎五味子知母山藥各兩人參細辛上為末煉蜜為丸清茶送下除風湯防風車前子藁本五味子細辛川芎桔梗上每服三錢白湯送下或水煎服血翳包睛問曰人之患血翳遮兩睛者何也答曰皆因心經發熱肝臟虛勞受邪熱致令眼中赤澀腫痛淚出漸有赤脈通睛常時舉發久則發筋結厚遮滿烏睛如赤肉之相故名曰血翳包睛宜服瀉心湯次以修肝活血湯瀉心湯黃連黃芩大黃連翹荊芥赤芍藥車前子薄荷菊花各一兩上㕮咀每服四五錢水煎溫服修肝活血湯當歸生地黃赤芍各兩半川芎羌活各七錢黃耆防風黃連大黃薄荷連翹菊花白蒺藜各一兩上每服四五錢水煎入酒二盞溫服問曰血翳包睛者何也答曰心熱血旺也此病初患易治若至血散盡難消痛時用破血紅花散當歸龍膽湯點用清涼散當歸龍膽湯防風石膏柴胡羌活五味子升麻甘草黃連酒洗黃芩酒洗黃耆黃柏酒洗當歸龍膽草赤芍藥各五錢上㕮咀每服五錢水煎至二碗去渣入酒少許臨臥熱服忌言語破血紅花散當歸梢川芎赤芍藥枳殼蘇葉連翹黃連黃耆梔子大黃蘇木紅花白芷薄荷升麻上各等分水煎加酒三盞溫服瞼生偷針問曰人之患目瞼生小癤俗名偷針者何也答曰陽明胃經之熱毒也或因食壅熱之物或飲食太過使胃經上充於眼目故瞼眥之間時發瘡毒俗名偷針此症番轉瞼皮劆洗瘀血點用清涼散先宜服退赤散後用通精散瀉脾飲退赤散黃芩黃連白芷當歸赤芍藥梔子桑白皮木通桔梗連翹每服水煎食後服通精散防風川芎當歸赤芍藥大黃芒硝蒺藜石膏黃芩甘草桔梗牙硝黃連羌活滑石荊芥上用姜三片食後服瀉脾飲茺蔚子防風黃芩玄參梔子石膏大黃炙知母黃柏黑翳如珠黑翳如珠者腎肝俱勞七情鬱結之人毒氣攻充熱極淚出難開疼痛甚至水輪突起黑翳如豆如珠大小不定撐起眼胞磣澀礙人眼睛難以運動寢食不安先患一隻後乃相牽俱損治法用小鋒針逐個橫穿破其黑翳中有惡水流出即平勢若拾芥瞬息痊安眼即能開設若不諳此療服涼劑點涼藥靡有其功小兒如此患者多是疳眼其翳起來或如小香菰之狀不宜針其治法載小兒疳眼條下其針破翳根處宜淡丹藥吹點消磨翳根問曰風輪生翳如珠如蠅頭如蟹眼者何也答曰肝腎二經風熱氣鬱也治法久積黑翳高者宜挑破珠頭疼者宜撥雲湯明目細辛湯主之熱甚者當歸龍膽湯主之點用二八丹調乳汁用未成此症以暴發推之撥雲湯治眼黑翳如珠蟹睛疼痛風氣傷肝腎二經宜服之黃耆蜜炙細辛生薑乾葛川芎熱者除之柴胡荊芥藁本甘草升麻當歸知母羌活防風黃柏上為末每服六七錢水煎服明目細辛湯方在傷寒熱病後外障症內當歸龍膽湯方在前血翳包睛症內蟹睛疼痛蟹睛疼痛者如黑翳同症起於瞳仁肝腎之病焉其翳如豆如珠蟹睛者其翳起占瞳人翳根小而苗大此乃胋膈之病膈中壅毒胋氣伏熱赤澀淚出疼痛難開羞明怕日其翳發起尖高如蟹睛一般形狀治法與前症同用小鋒針針出惡水流盡即平次點以淡淡丹藥消其翳根其服藥不同前症宜用瀉肝補腎之劑服之空心服補腎之藥飯後服瀉肝散瀉肝散補腎散蟬蛻防風蒺藜炒當歸密蒙花木賊川芎菊花荊芥茯苓石決明煅過枸杞子知母黃柏青鹽上各等分水煎空心服旋螺尖起旋螺尖起者熱積於肝胋毒壅於膈門充攻睛珠疼痛中央瞳仁漸變青白色忽然凸起血絲纏繞此乃是膜入水輪二家並熱旋起尖來狀若螺尾遂號旋螺尖起證治法宜陰二陽四丹吹點或調鱔魚血點尖處若年久須有鋒針對瞳仁中央針入半分放出惡水此乃取平之就紙封將息避風忌口十數日可也服用雙解散鬱金酒調散鬱金酒調散黃芩鬱金大黃防風梔子當歸川芎赤芍藥龍膽草上為末每服三錢溫酒調下食後服二次突起睛高突起睛高險峻厲害之症也同前旋螺尖大不祥矣皆因五臟毒風所蘊熱極充眼者內屬五臟外屬五輪五臟之氣毒攻五輪之瞳初起麻木疼痛汪汪淚出病勢洶湧卒暴之變莫測非精於龍木之奧旨不能措手諺云眼不醫不瞎正此也苟非其人殆有甚焉非徒無益而反害之治法揚湯止沸莫若去薪息火急投酒調散酒煎散宣退五臟之毒熱搗蔥艾尉五輪之突起消除疼痛洗以白芷細辛當歸蒼朮麻黃防風羌活未可與點藥宜忌口葷腥將息避風治法稍遲或控膿或突出一寸高者至此之際須鋒針針出惡水疼痛方止睛高取平耳無尤之效也酒調散當歸甘草赤芍藥菊花羌活桑螵蛸茺蔚子防風荊芥木賊上各等分水煎食後加酒三盞溫服硬瞼硬睛硬瞼硬睛者胞瞼睛珠俱木痛澀難運膈間積熱肝風上壅氣血凝滯睛瞼堅硬血旺氣虛之人或飲酒大腸堅結多受是症先患一眼後乃相牽俱損漸生翳膜治法初發時宜摩風膏摩去風邪散運血氣或煎生地黃當歸川芎赤芍白芷羌活熏洗日三度宜瀉肝膈之熱點以時藥若積年久瞼有瘀血宜劆洗黑睛有翳有膜可吹可點問曰眼患經久瞼胞睛珠俱木不運者何也答曰血氣受邪凝閉不行故也治法宜劆洗服用當歸活血煎助陽和血湯點用重藥加辛熱姜粉之類當歸活血湯方在前兩瞼黏睛症內助陽和血湯方在前傷寒熱病症內白陷魚鱗白陷魚鱗者肝肺二經積熱充壅攻上致黑睛遂生白翳如魚鱗鋪砌之狀或入棗花中有白陷發歇不時或發或聚疼痛淚出然婦人多生此病何也苦樂不由己出七情鬱結不舒毒蘊於肝肺者血之室也婦人以血為主血傷則生肝風黑仁風輪多生是翳甚至白陷釘入黃仁引血相授漸成大患額頭兼痛用摩頂膏摩擦封貼於額頭處用陰二陽四丹吹點或用青鹽黃泥固濟包煨熟研末以鴨毛點於魚鱗中日一次又能除此翳耳問曰黑睛生白翳凹入不平成陷者何也答曰肝虛血衰也故肝虛則受風風甚則作痛血衰則成陷治法點用珍珠二八丹之類痛甚宜服酒調散方在前突起睛高症內沒藥散方在血灌瞳仁症內羞明而不痛者宜服蟬花散密蒙花散二方在兩瞼黏睛症內桑螵蛸酒調散方在暴風客熱症內花翳白陷與棗花白陷同人之患眼生翳如蘿蔔花或魚鱗子入陷如碎米者此肝經熱毒入腦致眼中忽然腫痛赤澀淚出不明頭痛鼻塞乃是肝風熱極腦中風熱極致使然也宜服瀉肝散加味修肝散主之瀉肝散黑參大黃黃芩知母桔梗車前子各一兩羌活龍膽草當歸芒硝上為末等分水煎服加味修肝散羌活防風桑螵蛸梔子薄荷當歸赤芍藥甘草麻黃連翹菊花木賊白蒺藜川芎大黃黃芩荊芥各一兩上為末等分水煎入酒溫服蟬花散蟬蛻菊花蒺藜蔓荊子草決明車前子防風黃芩甘草上等分水煎服補腎丸方在前蠅翅黑花症內密蒙花散方在前兩瞼黏睛症內冰蝦翳深冰蝦翳深者黑睛上生翳如冰蝦形狀因而名曰冰蝦也大抵與魚鱗白陷同也亦因肝經有熱微微小小點在眼之風輪黑睛含糊清眵填黏於翳之低處乍時赤澀淚出眵滿矇蔽瞳仁一重如鼻涕或黃或白看則如膜遮障一般蘸卻又生日久能致損眼發歇來往治法宜陰二陽四二夜吹一次稍退宜點侵晨用菊花側柏葉黃連歸鬚桑白皮之類煎湯日洗二三次服撥雲退翳散撥雲退翳散楮實子薄荷各五錢川芎一兩五錢黃連菊花蟬蛻各五錢栝蔞根生用三錢蔓荊子密蒙花蛇蛻各五錢荊芥穗香白芷木賊防風甘草各五錢上為末煉蜜為丸如櫻桃大每一兩作十丸每服二丸一日二服治眼引子於後氣障木香湯下眼常昏暗菊花湯下眼睛無神懶視當歸湯下婦人血暈當歸湯下虛弱之人十全大補湯下玉翳浮瞞玉翳者風充入腦積熱肝膈發歇疼痛失於調治日久積纍血凝不散結成白翳遮瞞瞳仁如玉色相似立名玉翳浮瞞如此之狀有進有退有紅有淚發歇未定治法用陰三陽二藥吹點一次眼淚帶藥汪汪流出如此之狀其翳膜必能漸漸收卷渾如磨鏡塵埃去盡明必復矣若發年久無進無退不紅不痛縱有丹藥之驗刀針之利終無措手之處撥雲墜翳服藥之聖功效不能施為縱然公侯王孫若受此疾為廢人矣雖有千金之貴天下之良醫莫能出其手也問曰人之患眼翳如玉色遮瞞烏睛者何也答曰此同肝風攻充入腦積熱在於肝膈之間久乃腎虛致眼中常發熱或赤痛初則紅腫赤脈穿睛漸漸生白翳膜初起時如碎米久則成片遮瞞烏睛凝結如玉色名曰玉翳遮睛治之宜服瀉肝散明目菊花散通明補腎丸瀉肝散治胃中熱歸尾大黃黃芩知母桔梗茺蔚子芒硝車前子防風赤芍藥梔子連翹薄荷上各等分每服六錢水煎服明目菊花散菊花車前子熟地黃木賊密蒙花薄荷連翹白蒺藜防風荊芥穗甘草川芎各等分水煎服通明補腎丸楮實子五味子枸杞子各一兩人參菟絲子肉蓯蓉菊花熟地黃當歸牛膝知母黃柏青鹽各一兩上煉蜜為丸每服五十丸空心鹽湯下膜入水輪膜入水輪者肝臟積熱邪在肺經此金剋木之候也故黃仁乍時生瘡白色可後又發日往月來致膜漸入水輪此翳之根也如水之得土變化異常遂生瘡不退日積月纍久成大患謂之膜入水輪流汁流膿痛澀難開右患傳左左患傳右治法宜明藥之類加以蔥艾吹以丹藥服以湯散無有不效若傷日久不痛不疼不淚不紅如釘入木如玉之有瑕玷如玳瑁之有黑點此黃仁與水輪變白定矣雖使岐黃龍木再世亦不能為也問曰風輪生瘡或突起愈後變成白翳久不散者何也答曰肝木衰金氣甚也此病初患時有痛有淚治宜退血瀉肺金修肝活血無痛無淚淡白色者宜服補暖活血之劑治之瀉肺散當歸黃芩各一兩桔梗麻黃枳殼各半兩秦皮葶藶菊花旋覆花生地黃防風白芷甘草玄參梔子各一兩地骨皮八錢上為末每服三錢桑白皮煎湯下修肝活血湯歸尾赤芍各一兩半川芎羌活各七錢黃耆防風大黃黃連各三錢薄荷連翹白蒺藜菊花各一兩上每服四錢水煎服風輪釘翳釘翳根深者與膜入水輪同也此乃勞傷肝經或性躁急促之人啼哭含情之婦欲強制郁傷於肝赤澀難開痛牽頭腦淚出羞明怕日釘翳日深接引黃仁根深血援終不移治法用退熱飲去風散血之劑或痛甚服酒調散一二帖頭痛尉以蔥艾洗以防風川芎菊花歸尾白芷麻黃羌活荊芥之類量翳大小輕重吹以丹藥將息避風大忌淫欲嗔怒不疼不痛亦為不治之症也問曰風輪生翳如針如麻米者何也答曰肝虛火動也此症多是性躁之人或思慮太過所致治法疼痛甚者宜服洗肝散糖煎散點用珍珠散加涼膈散俱在前洗肝散梔子薄荷防風當歸甘草連翹大黃黃芩蒼朮羌活菊花木賊赤芍藥麻黃上各等分為末每服二錢食後蜜水調下或煎日進二三服糖煎散龍膽草防風防己大黃荊芥赤芍藥當歸甘草川芎上各等分為末水煎臨時投入砂糖少許同服黃膜下垂黃膜下垂者脾胃熱風結血凝氣滯膏脂窒塞血運不能通故生是疾發歇無時痛澀淚出漸生黃膜下垂發則膜舒退則膜卷胞皮下垂羞明怕日雖舉不張黃膜漸長遮瞞瞳仁也甚至滿目皆黃難辨人物治法雖不是拳毛倒睫之症亦可夾些眼皮使露黑睛黃膜氣舒發歇年久可夾乍發不宜夾治宜通脾瀉胃撥雲八正之劑以對充之丹片腦少許如有淚退之速無淚退之遲忌口齊戒使衰其血易於調理也又有一症黃膜從下生上為之黃膜上充大抵治同厚者宜挑剪問曰白睛黃赤生翳如赤膜者何也答曰脾胃得肝木剋土之候也治宜省味金花丸去其黃膜後用針沙平胃丸收功點用重藥腦不可用少下針沙平胃丸久服平胃氣去肝邪蒼朮厚朴陳皮甘草針沙上各等分㕮咀為末煉蜜為丸如緑豆大每服五十丸空心米湯下省味金花丸治脾胃積熱致生黃膜梔子黃芩黃柏桑白皮地骨皮桔梗知母甘草上為細末煉蜜為丸清茶送下赤膜下垂眼胞下生赤膜垂下遮於黑睛疼痛者乃胃熱也治法紅痛甚者服鬱金酒調散大黃當歸散微退後用撥雲湯生地黃散點用重藥加清涼散藥以上方俱在前大黃當歸散治胃中有熱生膜疼痛當歸芍藥川芎菊花大黃黃芩杏仁薄荷上各等分㕮咀食後水煎溫服生地黃散治眼下赤膜發歇無時久服則不發生地黃黃柏知母防風荊芥升麻乾葛天花粉黃芩甘草桑白皮白茯苓赤芍藥上㕮咀每服七八錢重水煎食後服逆順生翳逆順生翳與赤膜下垂與黃膜下垂上充之症頗同然此順逆者五臟虛勞風熱衝於肝膈上胞陽明經毒壅血氣凝滯故生赤膜垂下謂之垂簾翳此為順下瞼太陰肝經毒壅故翳膜下生向上謂之逆翳治法宜服瀉脾胃之劑大抵去翳之藥隨其輕重增減用之宜忌口諸毒問曰眼上下逆順上翳者何也答曰肝經虛損積毒熱甚至生翳四起侵黑睛治宜明目流氣飲蟬花無比散點用珍珠散次用三七丹腫者亦可劆洗明目流氣飲方在前傷寒熱病症內治脾得邪熱或逆順生翳蟬花無比散治風毒傷目昏暗漸生白翳遮睛白茯苓甘草炙助胃防風各四兩川芎赤芍藥各二兩石決明鹽水煮研極細白蒺藜炒去尖各四兩蛇蛻炙三兩蟬蛻去頭足四兩蒼朮一兩當歸酒浸二兩上為末每服三錢食後米汁調服茶亦可忌食毒物漏眼膿血漏眼膿血者有甚於釘翳並膜入水輪二症之利害也此症未發之時其頭先覺昏悶四肢如勞五臟多積風熱壅毒攻充於黑睛黃仁生出毒瘡灌溉水輪控血潰爛流膿治法宜蔥艾入白芷鍋內炒熱以棉裹尉於眼胞上屢換熱的散其惡血消其敗膿止其惡痛生地黃搗爛煨尉於有瘡處更妙用陰二陽四丹對於有瘡處吹或單用枯礬輕粉血竭乳香研細對著瘡處吹點亦可洗以桑白皮入鹽花明礬熏洗服以墜翳明目丸沒藥散忌動風動血之物墜翳明目丸方在前血灌瞳仁症內沒藥散沒藥大黃蒸少用朴硝上為末每服三錢酒調下茶亦可飛塵入眼飛塵入眼者此病全然無事誤被物或飛塵飛絲入眼者此外傷也只為塵物黏在胞瞼之間黏定不出痛澀難開磣淚出致生障膜初患之時治法用絲線纏耳環腳番轉上下胞瞼撥出塵物即可若初時不諳此法少療日久必生翳膜遮瞞瞳仁須有丹藥吹點胞瞼內仔細番看有物黏處必定有血積成塊或肉疙瘩此是病之發縱處宜小鋒針挑撥或有刺塵處針毒血出可此為病之根也曰外病也初起宜將絲線卷銅匙腳捻撥出塵物久者宜番轉看上下有積處劆洗至平點用清涼散服以散血退熱之劑酒調散當歸甘草大黃赤芍藥菊花桔梗蒼朮桑螵蛸麻黃羌活茺蔚子連翹各一兩上為末每服三錢酒調服修肝散防風羌活當歸生地黃黃芩梔子赤芍藥大黃甘草蒺藜各一兩上水煎服拳毛倒睫拳毛倒睫者此脾與肺二經之得風熱也肺為五臟之華蓋主一身之皮毛肺虛損則皮聚而毛落也脾家多壅濕熱致令上胞常腫大抵肝家受熱不時淚出痛癢羞明怕日赤澀難開常以手摩引致令上下胞瞼皮漸長眼漸緊故睫毛番倒裡面刺眼礙澀瞳仁漸生翳膜欹頭則視不能正觀治法先宜劆洗瘀血後用竹夾夾起眼皮灸四五壯為妙使毛生向外其疾瘳耳睛中有翳用陰二陽五丹吹點翳即消磨其夾須依口訣務令夾起不可滋水恐潰有疤痕若脫下痕處用光粉調香油逐早搽抹久則生肉一般眼目光明如舊細辛湯治脾經腫得風熱宜服細辛防風茺蔚子知母大黃桔梗羚羊角黑參上㕮咀每服四錢用水煎食後溫服防風飲子黃連一兩細辛蔓荊子各三錢葛根防風各五錢當歸身七錢甘草炙人參上水煎食遠服避風忌口除濕壓熱飲細辛蒼朮各一兩防風知母茺蔚子各兩半桔梗二兩大黃黃芩梔子仁朴硝上水煎服阿膠丸阿膠蛤粉炒鼠黏子炒甘草糯米炒各一兩馬兜鈴款冬花紫菀桔梗上為末煉蜜為丸如彈子大每服一丸食後細嚼薄荷湯下密蒙花散密蒙花羌活菊花石決明木賊黃柏白蒺藜黃芩蔓荊子青葙子枸杞子上每服三錢茶送下水煎亦可充風淚出充風淚出者症非一也有腎虛不生肝木肝經受風而虛損故木動也迎風而淚出也肝經虛者宜服止淚補肝散止之大止淚之法點用重藥熱淚者服川芎茶調散點用清涼散肝風者宜蒼朮止之不赤不痛淚出是謂之風淚腫痛赤澀淚出者此熱淚也若迎風而出汪汪冬日多夏日少拭即還生又不分四季皆有此冷淚也冷淚者乳香川烏丸川烏一個草烏二個去皮明礬一錢白麵塊一個為末豵豬膽汁為丸如黍米大每用一丸夜臥時放在眼之大眥頭淚出即止或灸止之又有肺臟久冷大眥有竅名為淚堂淚堂通肺腑此淚難治久流則能令目昏暗血氣虛弱之人不腫不赤但淡紫紅者澀痛淚出是虛淚灸法久流冷淚灸上迎香二穴天府二穴肝腧二穴第九骨開各對寸止淚補肝散治肝虛迎風淚出不止宜灸睛明二穴系大眥頭風池二穴臨泣二穴蒺藜當歸熟地黃白芍藥川芎木賊防風夏枯草血虛者不用上各等分為末每服二三錢茶清送下蒼朮散治風濕傷肝濕淚昏花蒼朮木賊香附米夏枯草蟬蛻甘草蒺藜白芷防風蔓荊子川芎殭蠶上依各等分為末每服二三錢茶清下酒亦可川芎茶調散治一切熱淚眼弦濕爛川芎防風羌活甘草石決明木賊石膏炒荊芥菊花薄荷葉上各一兩為末每服二三錢食後茶下肝風積熱肝風積熱者肝家勞苦七情鬱結二三年間來來往往一發一歇遂生翳膜或聚或散赤澀淚出此症多是夜勤燈光觀書史或雕畫打銀細巧之人久纍肝家積熱成風肝若受風必有腦疼不覺漸漸昏蒙治法有翳者吹以丹藥內服瀉肝省風之劑除肝家之風熱忌口將息一年半載病根除矣其洗眼照依疼痛腫澀洗眼之方載在前症條下問曰眼目連年歇發無時者何也答曰肝經積熱也經云肝勞則氣逆肝寧則氣順氣急則發氣順則歇治宜發時痛甚者服洗肝散省風湯之類常服此數方則能除此病也點用清涼散洗肝散方在天行赤眼症內瀉肝散治肝經積熱黑參大黃黃芩知母桔梗芒硝上各等分為末每服二三錢食後熱水調下日二次省風湯治肝熱火旺瞳仁不清或細小宜服防風犀角大黃知母玄參黃芩羚羊角肝虛不用桔梗上為末每服二錢水煎入燈心竹葉食後服坐起生花坐起生花者此是內障此症肝血衰肝腎二經虛也六陽不舉故久坐傷血起則頭暈眼花或前常見花發數般或赤或黑或白繚亂昏暗不明良久乃定瞳仁開大不清此症宜補肝腎或明目固本丸不治患久變為青盲內障變為五風難治之症也固本丸只生熟二地黃天門二冬加人參也問曰人之坐起眼前見花數般茫茫如蠅翅者何也答曰肝腎二經乏氣也經云肝腎之氣充則精彩光明肝經之氣乏則昏蒙眩暈治法宜補腎丸補肝重光散還精丸明目固本丸補腎明目丸隨人氣體虛實加減用之補腎丸治血氣虛弱變成內障宜服磁石火煅醋淬七次水飛過三兩肉蓯蓉酒浸焙五味子熟地黃酒蒸焙枸杞子菟絲子洗淨酒浸蒸另研各二兩楮實子覆盆子酒浸車前子酒浸石斛去根各一兩沉香另研五錢黃柏各二兩青鹽另研五錢或加知母上煉蜜為丸如桐子大每服五十丸空心鹽湯下補腎明目丸治肝腎血虛視物不明諸眼服涼藥表裡愈後少神光羚羊角生地黃肉蓯蓉枸杞子防風草決明各一兩楮實子五錢干菊花羌活當歸各二兩羊子肝四兩煮焙上為末煉蜜丸如梧桐子大每服二十丸空心鹽湯送下日午清茶下臨臥酒下不飲酒人參當歸湯下明目固本丸治心熱腎水不足用少睛光久服生精清心生地黃熟地黃天門冬麥門冬枸杞子干菊花上各研末煉蜜為丸如梧桐子大每服三十丸空心鹽湯下黃昏不見人之兩目至日落西之時漸漸不見亦系內障俗謂之雞矇眼也此乃腎之虛也眼雖屬於竅門乃歸腎而為主腎虛則眼目昏或貪淫樂欲酒色過度使腎臟衰憊稟受天真不全精神短少致瞳仁神腎水不清故目之無光也治之須有還睛補腎看人老少虛實斟酌藥餌以平之飲食以補之戒色斷怒使會陰水自然明矣還精補腎丸治內障方在目暗生花症內補腎明目丸治諸內障欲變五風變化視物不明川芎當歸熟地黃菊花山藥知母石菖蒲黃柏青鹽遠志白蒺藜川巴戟五味子白芍藥桑螵蛸茺蔚子菟絲子青葙子密蒙花枸杞子肉蓯蓉石決明上為末煉蜜為丸如梧桐子大每服四十丸空心鹽湯下十味還睛丸治下元虛憊一切內障防風羌活密蒙花青葙子川芎蒺藜甘草白朮木賊菟絲子酒浸三宿生用焙乾上為末煉蜜為丸如梧桐子大每服二十丸空心鹽湯下瞳人幹缺瞳仁幹缺者亦系內障與外障無預但因頭疼痛而起故列外障條中按此症因夜臥不得肝臟魂肺藏魄魂魄不安精神不定而少臥勞傷於肝故金井不圓上下東西如鋸齒鱔缺參差久則漸漸細小視物濛濛難辨人物相牽俱損治法宜瀉肝補腎之劑一本無眥鴻飛內有腎肝俱虛火旺也用豬肝煮熟露宿侵晨切薄蘸夜明沙細嚼此藥能通明益膽之功瞳仁小者肝之實瞳仁大者肝之虛此症失於醫治久久瞳多鎖緊如小針眼大內結有云翳或黃或青或白陰看不大陽看不小遂成瞽疾耳初起時眼珠墜痛大眥微紅猶見三光者治宜服五瀉湯省風湯同補腎丸及補腎明目丸久服效方俱在前五瀉湯治瞳仁幹缺火旺及五臟虛火旺動此藥能瀉火黃柏知母木通梔子生地黃甘草黑參桔梗黃芩防風熱甚加羚羊角犀角黃連上㕮咀每服六七錢用水煎食後服癢極難忍癢極難忍者肝經受熱膽因虛熱風邪攻充肝含熱極肝受風之燥動木搖風動其癢發焉故諸癢屬虛虛則癢諸痛為實實則痛有黑珠癢者有眼弦癢者點以丹藥或煨姜摩擦淚通癢止或濕癢用碧天丹洗侵晨洗以鹽湯或入桑白皮防風荊芥薄荷之類問曰眼迎風受癢者何也答曰肝肺二經受風邪也治法癢時用三霜丸撥雲散棉裹散洗用去風藥三霜丸治癢極難忍用此丸即愈姜粉枯礬白硼砂上為末口津液調和如粟大要用時將一丸放於大眥止之棉裹散治眼濕淚爛弦眼目當歸黃連各一錢銅青七分枯礬四分朴硝上各為細末用細絹包綿縛緊每一個約龍眼核大要用時將一個用白湯半盞泡洗一日二次眼內風癢問曰人之患眼遇風癢極者何也答曰此因肝虛合畜風熱膽經風毒上充入眼遂遇風受癢宜劆洗服藁本烏蛇湯補膽湯藁本烏蛇湯藁本烏蛇防風羌活白芍藥川芎細辛上浸酒煎服亦可補膽湯前胡馬兜鈴茯苓各一兩柴胡人參桔梗細辛黑參上煉蜜為丸每服三錢水煎服亦可垂簾翳問曰人之患眼生翳如珠垂簾遮睛者何也答曰此因心火虛炎肝經風熱上攻入腦中熱毒流下注於風輪故眼赤澀淚出腫痛無時年久烏睛白紅色故名曰垂簾翳宜服洗心散加味修肝散洗心散荊芥薄荷連翹麻黃赤芍藥梔子黃連大黃各一兩上每服五錢水煎服加味修肝散梔子薄荷各三兩羌活一兩當歸大黃連翹各五錢黃芩赤芍藥菊花木賊白蒺藜川芎各一兩麻黃甘草上為末每服三錢用酒調下痛用酒不痛水煎服鶻眼凝睛鶻眼凝睛此驟然所感非久患之症因五臟皆受熱毒致五輪振起堅硬不能轉運氣血凝滯睜然如鶻鳥之眼凝視不運之貌難辨人物因形而名曰鶻眼凝睛治法宜用香油調姜粉汁於額瞼部摩擦及面上或摩風膏摩擦更好服以酒煎散以被蓋出汗其眼即活動面面用燈火燒之斷其風路此症多是小兒急慢驚風之症大人少有此患桑螵蛸酒調散方在前暴風客熱內眼障初服導痰消風散陳皮半夏甘草白芷全蠍羌活防風荊芥升麻細辛蘆薈上㕮咀各等分水煎姜三片溫服轆轤展開轆轤展開者與鶻眼凝睛症同鶻眼凝睛者睛凝不運之貌轆轤展開而大者此膽腎之水散焉瞳仁之大小隨黃仁之展縮黃仁展則瞳仁小黃仁縮則瞳仁大人不知瞳仁能大小者非也此乃肝受風而不展轆轤則瞳仁囨圓也隨肝輪而縮覺見瞳仁大不收號曰轆轤展開症風充入腦眼帶吊起此症小兒急慢驚風受之治法同前薑汁調香油摩風膏摩擦藥用蚌殼頻頻灌下乳母忌口問曰瞳仁開大眼不收而展縮者何也答曰肝受風痰盛也治法僻巽錠子牛黃丸石楠散初起者宜發表小兒如患此治法亦同僻巽錠子治肝膽受風變成前症小兒通睛瞳仁闊大並皆治之牛膽南星七錢防風乾薑各三錢白附子五錢牛黃三分川烏白芷薄荷木香白朮白茯苓人參各五錢硃砂一錢麝香五分白殭蠶二十個生用片腦五分上將前藥俱研為細末冬用蜜二斤甘草半斤煎作膏稀稠得宜將次藥末和作錠子金箔為衣小兒急慢驚風手足搐搦金銀箔磨湯化下一錠大人破傷風酒化下三四錠子約一錢一個或七分一個夏用麻黃一斤甘草半斤用水三四碗砂鍋內煎至一鍾之時入蜜一斤緩緩熬煉滴水內成珠方將前藥搜和為丸即作錠子也牛黃丸能去風痰牛黃二分白附子全蠍肉桂川芎石膏各一兩白芷三分藿香五錢麝香少許硃砂二錢上為細末煉蜜為丸如梧桐子大每服二三丸臨臥薄荷湯下通頂石楠散能利膈開風痰石楠藤藜蘆各一兩瓜蒂七分上為末米湯下一匙日一二度灌入口內去風痰小兒通睛小兒通睛與鶻眼凝睛轆轤展開此三症頗同然此症或因外物打著頭顱或被諸般人物驚心遂成驚風之症風熱傷肝魂不應目風邪上壅黃仁不成關鎖瞳仁開惟直視不辨人物致眼通睛通者黃仁水輪皆黑似無黃仁瞳仁水散似無瞳仁此黃仁與瞳仁通混不分號曰通瞳亦風藥摩擦二法發散風邪宜服牛黃丸不須點藥只服藥然前症牛黃丸通頂石楠散亦可用也牛黃丸通頂石楠散二方俱在前症條下五七犀角飲犀角人參茯苓甘草遠志各一兩麝香少許龍膽草黃芩各五錢上㕮咀水煎服小兒疹痘小兒疹痘者名為百歲瘡也不論大小俱患一度疹痘入眼疹有兩分痘瘡初上皮膚之際眼閉不開眼上即有痘瘡點在黑睛上易治急取益母草煎湯熏洗日三度更以陰一陽五丹調鱔魚血點忌口及夜啼乳母亦忌口須疹痘痊可其眼漸開眼中之痘亦隨而痊矣又有一症痘疹之後瘡痂落盡肌體肥壯眼中忽然紅澀此乃餘毒鬱結於肝而發出此症十分利害失治多能害目只用車前草擂水頻與飲下洗卻肝經之熱毒洗以益母草點以鱔魚血調藥經曰疹痘之後毒氣鬱結於肝而氣不能泄攻發於眼傷於瞳仁者素無治法也問曰小兒此症入眼者何也答曰小兒痘瘡之發五臟皆熱毒之氣壅塞停留熱氣在肝膈充入眼使疼痛淚出怕日羞明難開遂生瘡於眼內久發變為白膜初覺瘡入眼中赤澀之時急將藥泄其毒外以退翳之藥若不能為終身之患也先將秦皮湯洗目眼紅花退翳散服之效秦皮湯洗眼秦皮秦艽防風細辛各兩甘草一錢上將水二盞煎至一半熱洗紅花散紅花連翹當歸生地黃紫草大黃甘草赤芍藥上燈心竹葉水煎服退翳散即豬肝散真蛤粉穀精草夜明砂上為細末用豬肝二兩切開摻藥於內以麻扎定煮水冷將肝同藥細嚼煮肝本汁咽諸般毒物莫吃小兒眼生翳小兒眼生翳者脾胃實熱所致或是胎中受毒或因乳母好食熱物皆能令小兒患眼量兒之大小疾之遠近輕重一周半載者其藥須令母吃或蛤殼灌入小兒吃可也二三歲者此是胎毒也離母之後患眼者此是小兒自受之症與母無預此藥須令小兒吃忌以油膩煎炒糖甜果子之類不獨患眼所忌不忌多生驚症變為疳傷亦能害目甚至不治之症其疳眼別有余條款此乃小兒生翳症也黑睛如麻豆大如蘿蔔花與疳眼大不侔矣一倍三黃丹一倍珍珠散點用加味修肝散梔子薄荷連翹麻黃赤芍藥羌活當歸大黃黃芩菊花木賊白蒺藜川芎甘草上水煎食後服痘疹入眼問曰小兒疹痘入眼者何也答曰小兒於母胎中受其毒必發疹痘出之時五臟俱有熱相攻或肝臟受熱甚必有痘生於目內宜服涼肝散草決明天花粉甘草赤芍藥緑豆皮穀精草上為末每服六錢蜜水調下問曰小兒痘疹傷眼者何也答曰內臟虛熱上攻也治法經云切不可泄餘毒宜用微涼劑和解此症初起睛上紅紫澀痛可用通神散或車前草擂蜜水頻頻與吃洗去肝中火邪若至喪明睛中有翳或凹入者經云疹痘之後毒氣鬱結於肝傷於瞳素無治法也通神散治小兒疹痘用此能解毒白菊花緑豆皮穀精草石決明煅過上各等分為末每服二錢乾柿一個米汁水一盞同煎候水乾不拘時服能服湯藥只將本方煎服亦可救苦觀音散桔梗當歸連翹藁本細辛蒼朮龍膽草羌活黃連知母黃芩黃柏川芎柴胡防風升麻生地黃紅花上各等分煉蜜為丸能吞者每四五十丸服小者量服之通神散菊花穀精草密蒙花緑豆皮蒼朮石決明甘草黃芩蟬蛻木賊上各等分水煎食後溫服小兒雀目問曰大人小兒雀目至申酉時不見物者何也答曰肝虛受邪熱所傷經絡凝滯不和陰陽不和榮衛不通夜至昏也治法宜服五膽丸蝙蝠肝散又宜服蒼蠅散豬肝散主之不用點藥虛極者用補藥亦可增減用之蒼蠅散用蒼蠅翅草及花為細末用白水煮豬肝露一宿空心煎丸又可服豬肝散豬肝散即退翳散方在前小兒疹痘症內五膽丸熊膽一個黃牛膽二個青魚膽一個鯉魚膽二個青羊膽一個石決明二兩夜明沙一兩麝香少許上為末將前膽和為丸如緑豆大每服三十丸空心茶下蝙蝠散蝙蝠肝一個石膏一兩黃丹石決明煅白蒺藜炒各二兩若無蝠肝用羊肝加夜明沙上將前藥研細末每服二錢米湯調下無蝙蝠肝用羊肝一塊切作四塊以藥一二錢摻肝內以麻縛定用米汁水入罐內煮熟次早取出羊肝藥細嚼以煮肝汁同食效如體虛弱之人亦可服補藥為丸尤妙胎風赤爛胎風赤爛者其症有三初時血露入眼洗不乾淨而生是疾遂至赤爛又有在母胎中其母不知忌口多食壅毒之物酒面五辛之類至産生三四個月兩眼雙赤眵黏四眥紅赤濕爛此是胎毒所致此小兒在腹中飲母血血毒於兒出生方發此症也又有乳母壯盛之人抱兒供乳之際兒口未哺乳頭汁脹滿其汁灑然射出充入兒眼亦能生此爛濕若充射面部則能生疵濕瘡癢大抵此三症通號曰胎風赤爛孰知內有三因之由血露不淨與乳充射宜碧天丹洗胎毒者須再服三黃丸忌口其兒亦用三黃湯熏洗點以時藥可也服宜小防風湯小承氣湯小菊花膏導赤散此數方隨冷熱用之或童子患眼者治法亦用此數方加減點用時藥小防風湯此方治小兒胎風赤爛小兒眼生翳大黃梔子甘草赤芍歸尾防風羌活上等分水煎食後服小承氣湯大黃薄荷杏仁蟬蛻甘草羌活天麻當歸赤芍藥防風上水煎服小菊花膏丸治小兒風毒眼黃連枯黃芩大黃干菊花羌活蒼朮荊芥防風上為細末煉蜜為丸每服四五十丸或為膏小兒疳傷小兒疳傷之症富貴之家多生是疾蓋因父母過愛之由也小兒如草木之萌芽難受風日寒露之欺且小兒五臟六腑未實氣血柔弱怎禁油膩煎炒及諸般葷腥或一周半載縱口味食糖甜之物及鵝鴨雞豬牛羊等肉或飯方了又哺以乳或乳方飽又與其飯此出於父母至情富貴之家有是症焉或貧賤之家亦有是症何也一食諸物不消不化先傷於脾致腹脹午後發熱至夜半方退日久頭髮稀疏轉作泄瀉頻頻瀉甚則渴至傷肝膽眼之白仁鮮紅羞明怕日漸生翳膜遮瞞黑珠或突起如黑豆如香菰之狀治法先治內後治外用雞卵入輕粉一二分使君子仁一個半蔥珠幾顆濕綿包煨與吃宜空心連吃五七彈止又宜煮羊肝露宿蘸夜明沙吃或煮豬肝亦可切宜忌口葷腥其白膜用陰一陽七藥調乳點煎胡宣二連服側柏葉熏洗若疳傷肝膽眼珠突出或瞎盡為不治之症不獨瞎眼甚至傷命若聲啞口乾手腳俱腫十死八九問曰小兒疳傷眼目疼痛羞明不開烏睛上青翳如黑珠子或白膜遮睛者何也答曰此因飲乳之際好食果子雜物油膩及熱毒物多使脾胃生疳或瀉泄不止夜間潮熱久則疳蟲傷肝上攻眼目初覺紅澀羞明急療若烏睛上變成有黑翳如珠泄瀉不止者多是不治宜服除熱飲等方五疳丸治小兒疳眼面瘦皮黃羞明怕日食乳不消緑礬成堁浣淨密陀僧制過夜明砂各一兩上為末用蒸棗肉搗前藥末為丸如黍米大每服三四十丸量兒之大小空心米湯下除熱飲大黃知母防風黃芩各兩黑參茺蔚子菊花木賊各一兩半上水煎食後服三貼用雞蛋一個使君子仁三個輕粉二分合研末入蛋內煨熟空心服至二三個即去疳蟲後服五疳丸五疳丸胡黃連五錢牛黃一錢密陀僧一兩夜明砂緑礬三兩上用棗肉為丸緑豆大空心服三十丸米湯送下蕪夷丸治小兒五疳蕪夷黃連神麯麥芽炒上各等分為末麵糊為丸緑豆大每服十丸至十五丸米湯下五疳陳皮湯寒熱往來薄荷湯下風弦赤眼問曰人之患眼兩瞼時常赤爛者何也答曰大人患者因脾土蘊積濕熱脾土衰不能化濕故濕熱之氣相攻傳發於胞瞼之間致使羞明淚出含在胞瞼之內此淚熱毒以致眼弦赤爛治法春夏爛者為熱爛服用三黃湯洗用散金錢湯有瘀血宜劆洗與服瀉脾湯秋冬爛者為冷爛又曰迎風灑淚洗用碧天丹點用重藥瞼厚劆洗之後宜火烙之小兒患者因母胎中受熱或落地之時惡露入目沐浴不淨拭之未乾卻感外傷風邪使邪入目亦生此疾治之小兒服黃耆湯大人服茶調散熱甚洗金錢湯風甚洗碧天丹先劆洗後服藥黃耆湯黃耆車前子細辛黃芩五味子蒼朮黃連各一兩上各等分水煎服茶調散即川芎茶調散方在前充風淚出症內三黃湯在胬肉攀睛症內棉里散在癢極難忍症內碧天丹金錢湯治年久弦爛古錢即老銅錢生鏽者用七個黃連研末二錢白梅乾五個梅自落者為白梅上將此三味用老酒二小盞於瓷罐內煎至半盞至夜時冷可洗用不過三四次即愈日二次爛弦火穴法魚尾二穴睛明二穴上迎香二穴攢竹一穴太陽二穴爛弦風之症因脾胃壅熱久受風濕更加吃諸毒物日積月纍致成風爛胞瞼之內變成風痘動則發癢不時因手拂拭甚則連眼眶皆爛無分春夏秋冬皆如是眵淚滿腮有不近人手之怕治法翻轉眼瞼利洗瘀血二三度或小鋒針針出瘀血亦可若因摩引有紅筋者宜老醋燒爐甘石淬七次加以陰丹量輕重搽點眼弦或吹點眼內無妨忌動風動血之物不食可也肝風目暗疼痛此症肝風目暗者乃是肝腎虛勞肝氣不足血虛故也不時疼痛舉發無時痛則惟眼珠墜痛頗有赤澀淚出看物依稀眼前多見花發數般或黃或白或黑見一物如見兩般形狀不清療治恐損眼也此症實有內外相兼病也非徒治外而不治內曷濟哉內則白蒺藜散補外則陰二陽八丹調乳汁點二三夜點一次加片腦少許洗以黃菊花赤芍藥側柏葉秦皮白芷川芎更加忌口五辛諸熱物莫吃補肝活血散虛者宜服藁本白芷石決明天麻防風細辛羌活黃耆菊花當歸生地黃黃連上各等分水煎服補腎丸治目暗疼痛恐變成黑風內障先宜服之澤瀉去土細辛去苗菟絲子酒浸焙乾五味子炒各一兩茺蔚子焙二兩山藥一兩五熟地黃焙二兩上為末研勻煉蜜為丸如梧桐子大每服二十丸空心鹽湯下白蒺藜散蒺藜菊花蔓荊子草決明甘草連翹青葙子上各等分水煎食後溫服迎風灑淚症問曰迎風灑淚者何也曰肝之虛也是亦腦冷迎風淚遂出拭卻還生夏月即少冬月即多後若經二三年間不以冬夏皆有此疾乃淚通於肝肝屬木目乃肝之外候為肝虛風動則淚流故迎風淚出即服補肝散治冷淚補肝散治冷淚當歸熟地黃川芎赤芍藥防風木賊上等分水煎服菊花散治熱淚菊花川芎木賊香附子夏枯草羌活各一兩草烏一錢防風甘草荊芥白芷各五錢上為末每服三錢茶下水煎亦可又方治實淚菊花蒺藜防風羌活川芎夏枯草木賊甘草各三兩上每服三錢湯調下水煎亦可川芎茶調散治熱淚方在前充風淚出症內蒼朮止淚散木賊香附子白芷石膏菊花荊芥白蒺藜薄荷當歸白芍藥川芎蟬蛻夏枯草上為末每服三錢食後茶清下冬淚酒下
