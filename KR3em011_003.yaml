四錢五倍子一錢白墡土一錢海螵蛸一錢薄荷葉五分上將此六味俱為末用老薑汁攪和為丸如圓眼核大要用時將一丸淡薑湯一盞泡散洗眼弦次日再洗依此洗三四次即愈八仙丹治爛眼弦風有蟲癢甚效當歸七分銅緑一錢薄荷七分白礬一錢黃連五倍子焰硝各五分輕粉二分上為極細末以絹篩用絹包約龍眼核大泡洗日三五次一方點藥撥翳膏蕤仁去皮殼麝香四分另研珍珠一錢放豆腐內蒸過琥珀一錢另研石蟹一錢煨片腦五分另研硼砂一錢另研青鹽八分另研白丁香五分水澄紅珊瑚石燕煅滴乳香炙熊膽微炙乾辰砂血竭金精石滾水泡銀精石滾水泡各一錢蘆甘石火煅黃連水淬淬七次用五錢或七錢硇砂一錢明者將紙七重包煨另研包起遇有翳厚者加入無翳者不用上為細末和勻用瓷器罐盛起一半乾點一半入後藥內為膏子點當歸尾生地黃赤白芍防風蔓荊子羌活連翹黃芩薄荷各用五錢銼細用雪水或臘月水兩大盞石器內煮藥至一盞去渣用真正好白蜜三兩再用文武火熬三四沸以新絹袋濾出收入瓷罐內卻將前藥末共作一處攪勻用清油紙縛住常常旋取點用此藥收八九年亦好不壞此仙傳方也藥性論當歸味甘性溫入心肝二經尾能破血頭養血全用活血熱者不可用制用酒洗川芎味辛性溫入肝經上行頭角助陽氣止痛下行血海能養血如氣旺者不可用赤芍藥味苦辛性寒入肝經能散血行血去赤膚止痛白芍藥味苦酸性寒入肝經能補脾損肝氣能養肝血瀉肝火如肝虛火衰者不可用熟地黃味甘性溫入心經肝經補血如熱者不可用用酒蒸杵爛為餅曬乾研為末作丸如不作丸勿蒸黃柏味苦寒入腎經補腎降相火如火衰不可用龍膽草味苦性涼入肝經益肝膽氣治目赤腫除胃家伏熱半夏除濕化痰和胃氣利胸膈治太陰頭痛制用薑汁炒羌活入膀胱經治頭痛去風邪降肝氣肝虛不用防風味甘辛性熱入膀胱經以體用通療諸風以氣味能瀉肺經黃連味苦寒入心經能瀉心火涼血去中焦熱厚腸胃大黃味苦寒入胃經有推牆倒壁之功能消腫去其皮膚之熱實者生用虛者酒蒸勿患虛腫者勿用生地黃入心經治血熱生新血散瘀血涼血血寒者勿用麻風入肺經去風寒退邪熱開九竅發表白芷味辛性熱入腸經去風止痛治足陽明頭痛去肺肝二經發熱細辛味辛性熱入心經能去風止淚頭痛益肝膽通竅去葉用山梔子味苦入肺經瀉肺火除五臟熱目熱赤腫宜用要炒木賊味甘入肺經去膜翳益肝膽明目去風通竅止淚蒼朮味辛性溫入胃經平胃氣去風邪去濕止淚發散用米泔水浸一日一換水浸炒乾用瞿麥味苦入小腸經去膀胱熱養腎氣明目利小便黃耆味甘性溫入脾經行氣固表虛血滯不行宜用蜜浸火炙研為末作丸如不作丸勿如此滑石入小腸經能降上炎之火通九竅利小便車前子味甘鹹性寒入小腸經清利小便去肝經風熱石決明入肝經去目障明目有沉墜之功肝虛者不用火煅極紅為度青葙子性微寒入肝經瀉熱上衝去赤障肝虛不用制用酒洗草決明入肝經治肝熱熱痛淚出明目肝虛不用白蒺藜不入湯藥宜丸入肝經明目去風止癢炒杵去刺用牡丹皮味苦寒入腎經瀉陰火陽火能涼心血能行滯血止痛地骨皮味苦寒入腎經退熱除蒸瀉肺熱宜用桑白皮味甘入肺經除肺熱瀉肺氣肺寒不用麥門冬味甘寒入肺經治肺熱去肺腑火又清心竅密蒙花味甘入肝經去目中赤脈眵淚能明目烏藥入肝經能順氣行氣去風胡黃連味苦寒入肝經退骨熱潮熱補肝膽明目能治小兒疳傷不下食霍亂熱痢疾小兒藥多用之蔓荊子味苦寒入三焦治頭疼眼睛痛能明目開鬱降火枸杞子味甘入腎經補腎明目去目中赤膜遮睛酒洗用何首烏味苦入心經去風寒治陽明頭疼蟬蛻入肝經去風解毒脫目翳止淚散寒邪白朮味苦溫入脾胃經能健脾胃生津液去胞瞼濕熱氣喘者勿用又能助氣香附米味苦辛能行氣助胃氣止淚去濕用之炒去毛杵淨夏枯草稟純陽之氣得陰氣則枯能止淚去風以陽補陰之理千里光入心經去風解毒熱明目亦能行氣即夜明砂水淘去屎留砂一種草藥名千里光採其嫩葉淨洗搗汁熬成膏單用點眼退翳明目恐即此也前注恐非遠志味苦氣溫入心經定心益志利竅安魂魄犀角入心經涼血解心熱清頭目鐵銼銼碎用或水磨服羚羊角入肝經清肺肝火清心明目肝虛不用石膏入胃經泄胃火伏熱有鎮之功胃虛不用乾葛味甘平入胃經解肌發表退熱升提胃氣藁本味辛入膀胱經去顛頭痛引藥上行使君子味甘入胃經殺疳蟲利小便薄荷味辛寒入肝經去賊風發表利關節止痛菊花味苦甘微寒入肝經明目清頭風去目翳發表茺蔚子味甘辛入眼經除血熱明目去風甘草味甘生寒熟溫入脾經生用能瀉火解毒炙者能助胃和平桑螵蛸補腎去風通五淋利小便明目散翳槐花味苦寒入心經去心赤瀉血瀉大腸熱鬱金味苦寒入心經治血鬱於目能涼能破心下氣開鬱黑參味苦鹹入腎經補腎氣明目得黃芩瀉肝火除肝熱知母味苦寒入腎經補腎水瀉腎火三焦火桔梗味苦溫入肺經治肺熱為諸藥之舟楫乃肺部之引經芒硝治積聚熱疾利大便不通漢防己味辛苦寒通行諸經去風寒有走達之功蒲黃味甘性平入心經能消瘀血破血消腫炒用連翹瀉心火解脾胃濕熱除心經客熱五味子味酸性溫入腎經肺經補腎滋肺益肝獨活味苦溫走諸經去外受賊風無分新舊楮實子味苦寒入肺經升陽上行能去風治頭痛肉蓯蓉味酸鹹性溫入腎經補腎生精用酒洗相火旺不用川椒味辛熱用之於上退六腑之沉寒用之於下去目中障盲去目炒去汗用人參味甘性溫無毒入肺經補氣不足安魂魄生精開心竅通血肺寒可用肺熱傷肺白茯苓味甘溫入肺經安魂定魄補心虛養神利小便旋覆花味甘入肺經清痰明目治頭風菟絲子味辛甘入腎經補腎明目能去目黑花酒洗蒸餅曬乾為丸不做丸勿制澤瀉味甘寒入膀胱利水通淋補陰不足明目黑附子味辛大熱入三焦主陽散風去寒邪火旺者不用即大附子去粗皮木香味苦性溫入心經主治心痛泄胞腹中滯寒冷氣不必過火磨入藥中服牛膝能引諸藥下行凡用土牛膝春夏用葉冬用根惟葉之效尤速能益精又治竹木刺入肉敷之即出石斛味甘性溫入腎經去胃熱補陰血益精壯筋骨紅花味甘苦入心經能破血行滯血少用又養血天門冬味苦氣寒入肺經瀉肺火定肺氣利小便涼血去心杵為餅曬乾為丸如不做分研石菖蒲味辛性熱入腎經補腎能開心竅明目柴胡味苦寒入肝經能除往來結熱積於胸中除肝熱又得黃芩能瀉肝火黃芩味苦寒入肺經枯者瀉肝火實者退膀胱熱巴戟能補腎益精療陰萎引氣上行陳皮去白者消痰利氣留白者補胃和中葶藶味苦寒入肺經瀉肝喘利水下肺氣炒用芎藭入腦治頭痛血虛者去頭風養血白附子一名兩頭尖去風痰止頭痛去粗皮用天麻主頭風去風疾利四肢濕痹枳殼寬腸下氣祛風化痰治風邪作痛栝蔞根即天花粉入肺經去痰火解熱毒又能除酒毒肺寒者不用冷痰者不可過用有熱藥此宜亦可用之萹蓄利小腸經熱閉小茴香味辛氣平開胃行氣止嘔吐膀胱冷氣腫痛入藥炒南星去風痰消腫毒用薑汁煮過草烏走筋骨敗血去風止痛薑汁煮用川烏去風寒作痛助陽荊芥去皮風邪發雄黃解熱毒散血止痛乳香調血氣利諸經之痛制用厚箬三片夾藥在中尉斗火尉去油研末用沒藥破血止痛去目翳暈同前製法血竭破積血止痛去赤膚木通利小腸經結熱降心火牛蒡子去風明目行血蛤粉能消痰火涼血解肌表極熱蛇蛻即蛇皮去風毒止淚癢痛全蠍消風毒破風痰尾更佳去四足藿香開胃氣結痰利之蠶蛻去風消痰明目去翳膜即晚蠶砂龍腦即薄荷性熱能通利寒熱去風消目赤甘松味甘性溫去風下氣治心腹痛辟惡風硃砂鎮心安魂魄涼血肉桂引太陽經止頭痛去寒邪利肝膽氣白蘞散結氣除目赤熱藜蘆吐氣風痰快膈去蘆用根有大毒用宜斟酌白芨去賊風解中風熱閉豬牙皂角去風痰解表利氣炙去皮弦香白芷去皮膚風熱瘡癢杏仁潤肺氣去痰行血紫蘇消痰解表利氣夜明砂明目去風山茱萸入腎經除頭暈補虛生精去核天麻子去風補腎明目碎研入煎藥熊膽退熱降火去目赤熱試真假用水一碗撒灰在內將熊膽放水中分灰水各開兩邊為真者其色潤黑山藥補腎不足生精牛黃去熱痰能安魂魄涼血清心石燕通血利小便治淋蕤仁去目中赤痛風癢去翳製法去殼用仁以竹筒盛在內於紅火煨藥紙干取出可去油聽用珍珠清心明目去目翳製法用豆腐一塊入珠於腐內蒸過取出用洗淨白棉布兩三重包珠石上杵爛用細末玄精石安魂魄有氣之功沙魚皮解風毒止淚威靈仙去風邪青皮能下氣快膈消痰濁氣升於至高者而能下氣虛者不用青鹽補腎引至下部水磨花銅鍋熬成鹽聽用川楝子明目退熱補腎去核用沉香補右尺命門壯元陽散滯血
