眼腫起如桃有不近人手之怕羞明怕日或內壅突起蠹紅淚出如湯鼻涕溏流內生淡赤虛翳如此狀者其翳不能為害熱去退翳即消此藥通解之痛止後用救苦湯當歸龍膽收功酒調洗肝散經驗洗肝散治一切熱眼及赤腫難開眼珠痛白仁赤而痛不虛可用止痛生地黃散後用功亦同當歸活血湯治一切羞明怕日者頭痛雖甚內不蠹紅此樣眼多虛或眼上珠生白陷翳者此方可與蟬花散密蒙花散相間服之效密蒙花散治一應體虛之人無疼有羞明者服涼藥不得其眼羞明而內痛白仁內隱紅常流清涕淚視物濛濛此藥可用日進二三服決明子散蟬花散此三方功亦同效省風湯治一切肝氣有餘瞳仁鎖緊或成幹缺視物不能明繚亂白仁淡紅瞳仁焦小黃色夜見五色烽光者此方能除肝膽極熱久仙飲治年老之人眼赤不退帶紫紅白色若有蠹紅者以暴發客熱類推之洗肝散治眼肝氣有餘風輪變色焦枯或疼痛外生赤翳此方能除火退肝熱紫金丸治外障生云膜血翳服涼藥不退而不多痛者可用夜光柳紅丸治風毒上攻眼虛腫頗有紫紅或癢或痛生翳年久服諸藥不效可用修肝散治暴發眼及發不時疼痛甚者熱服肝氣上升淚出汪汪內有鮮紅可用至如痛止血散不用補肝重明丸治諸眼服涼藥表裡愈後失神光者其眼無羞明用之能補養肝血還睛丸亦可用之當歸龍膽湯治眼中黃仁生白翳從下而上此候多是火旺也人有此患此藥瀉熱退火用能退翳消紅腫審症應驗口訣如男子婦人患偏正頭痛者先審熱甚用雙解散二三帖大通之後服川芎茶調散加涼劑點用九一丹冷痛者用桑螵蛸酒調散大通之後用川芎散神清散主之點用清涼散少加腦入些姜粉無不效矣烏輪赤暈刺痛浮漿此肝熱也治法宜用酒調洗肝散加麻黃赤芍或瀉肝散修肝散收功生地黃散點用清涼間九一丹眼生清淚枯黃繞睛此肝虛也治法用止淚補肝散點用九一丹後服補腎丸此乃滋母益子也瞳仁開大淡白偏斜者此腎虛也治方服補腎丸補腎明目丸駐景丸點用九一丹多服少點瞳仁焦小或帶微黃此腎熱也治法先服五瀉湯著風之類後收功用補腎明目丸久服甚效瞳青胞白癢而清淚不赤不痛是謂之風眼治法服羌活除風湯點九一丹間二八入些姜粉效烏輪突起胞硬瞳紅眵淚濕漿裡熱則痛是謂之熱眼治法用雙解散加涼大通之劑瞳痛止用生地黃散點用清涼散間九一丹點之隨人治法用之眼渾如淚胞腫而軟上壅濛濛酸渣微赤是謂之氣眼服桑螵蛸酒調散後服明目流氣飲當歸湯主之其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉點用九一丹間二八丹服羌活除風湯血熱交聚故生淫膚粟肉紅縷偷針之類服用瀉脾湯瀉心湯主之點用清涼散有淫膚粟肉可劆洗至平洗止眼熱經久復有風冷所乘則赤爛點用清涼散服用瀉心湯洗肝散主之洗用綿裹散其效甚捷眼中不痛而赤但為痰飲所注則作痛服用半夏二陳湯三四貼後服明目流氣飲不用點藥肝氣不順而挾熱所以羞明服用洗肝散二三貼加麻黃後服密蒙花散五七貼補腎主之點用九一丹加清涼散初不可重藥白睛帶赤或紅筋者其熱在肺服洗肺湯除熱飲洗肝散點用清涼藥九一丹上胞下瞼或目唇間如疥點者其熱在脾治法服泄脾湯泄脾除熱飲三黃丸主之可劆可洗用清涼散點有淚翳者九一丹點之因風則散之九一丹入些姜粉熱則清涼散點之氣結則調順之將前藥間點因風者可用防風散通聖散即名雙解散後服羌活除風湯熱者洗肝散修肝散氣結者服流氣飲黃耆湯主之白陷魚鱗之症多因肝腎俱實血衰成陷治法服酒調散二貼後服蟬花散密蒙花散相間服之效點用二八丹調乳汁點間九一丹點之突起睛高旋螺尖起險峻利害之症也又有一法與他取平之效將鋒針針入三分以鳳屎點針口所以毒攻毒或陰丹蘸點亦可先服鬱金酒調散四五貼後可動針此乃平之法無光之效也又有一症遞年月眼內癢極祕曰諸痛為實諸癢為虛人之患眼虛腫及眼眶骨此痰飲為患治法用明目流氣飲加半夏陳皮厚朴三味用姜二片同煎連服四五貼其痛即除另將二陳湯丹藥亦可點用治之隨輕重所施治法在人意耳頭風冷痛熱痛風痛痰厥痛系偏風陽明頭痛眼淚熱淚冷淚虛淚風淚濕淚審症祕論暴發眼者審他是熱甚用雙解散救苦湯當歸龍膽湯修肝散洗肝散瀉肝散鬱金酒調散有是風熱火病服涼藥不退者用明目細辛湯助陽活血湯紫金川芎茶調散明目流氣飲桑螵蛸酒調散有是久病血滯風甚用當歸和血煎神清散沒藥散捲雲湯發歇無時用生地黃散破血紅花散有是風毒為病用蟬花散如聖散川芎茶調散神清散夜光柳紅丸痰病用清熱半夏二陳湯之類老痰用四生湯有是久病無表病里病眼內淨了用蟬花散密蒙花散決明子散十味還睛丸若內病俱無但是外病可次第依法不須服藥有翳只是去翳藥加減療之辨眼經脈交傳病症論有人問於豫曰人之眼目乃五臟六腑之精苟有患傷於內腑其理何哉然則又有左病而不傳右右病而不傳左左右俱病未審其詳請而言之豫應之曰剺非精於岐黃龍木之奧者莫明乎此也夫眼者乃五臟之專精也目者乃心之竅也瞳仁者腎之精也宗精之水所以不出行血裹之氣輔之共湊於目頭者諸陽之所聚也足太陽膀胱之脈起於目之鋭眥通頂入腦正屬目本名曰眼系督脈陽柔之會首循風府而出則入系腦則為目風厥肝脈上出額督會於巔頂其別交者從目系風相搏故目𥉂瞴無所見頂中風府兩筋之間乃別陰陽交於目內鋭眥陰氣盛則目膜陽氣盛則目瞑病而不得臥者衛氣不得入於陰故陽氣滿而陰氣虛故目不瞑而不得視者衛氣流於陰不得於陽陽氣虛故目閉故病猶有偏勝之理且飲食之中有五味天地之氣有六淫人身之中有七情皆能生病更有賊微正邪之別氣與味也皆無形之物能傷於有形之質何患不生於病況眼科之中又有大方之不同治之各有異亦宜審其受病之因視其內外淺深之症假若一概治療不無抱薪之患良可惜哉豫因幼耽疾苦求醫療治逮今數年於是熟玩諸家之書可知玄妙之旨訪尋師友廣博方書採集百端推原其本凡有疑難之間不恥下問務究奧旨子能潛心注意雖不登岐黃龍木之岸亦可謂醫中魁者也凡看眼法先審瞳仁神光次看風輪再察白仁四辨胞瞼二眥此四者眼科之大要看眼之時令其平身正立緩緩舉手輕撐開眼皮先審瞳仁若有神光則開合猛烈次看風輪若展縮雄健則魂魄無病三察氣輪無病澤潤光滑四辨其肉輪若好則開合有力二眥不蠹赤矣凡察翳法久年翳膜能去者其翳浮虛爛紅其眼不張若近年發歇眼其翳紅白色浮厚者有些紅未退有淚者易散看其中多有死釘不能去若散翳其紅霞色者易退若因頭痛起因有死白翳者難退又有一樣厚翳去盡其眼全痊黑睛有些微云薄薄帶淡白色不能去名日冷翳凡烙法將烙時可安心定志將眼撐開用濕紙將四眥好肉處用濕紙敷定只留要烙處許大將匙燒紅於細綿上開過即烙之不可傷四弦烙乾用和解藥外敷之使其拔出火氣用夾法夾時先翻轉看上下胞瞼有瘀血處可劆劆至平血盡方可夾上夾子其夾不可高大只在重弦上仔細看其睫毛轉又要平正方可著力扯緊其夾肉處用小艾團灸三個不可多灸灸多恐潰夾決目夾肉若未乾可再催用淡淡丹藥去其餘翳此眼縱有厚翳不可用重藥用金針撥光了之時將蓉花葉末調水護之一日一換宜服謹翳丸等方凡撥金針者看人肥瘦就手撥之肥狀者先宜服退氣散血和其五臟後可撥之退氣散血方大黃末二錢五分當歸末二錢五分穿山甲一分二釐連翹二分二釐白芷一分二釐乳香一分二釐沒藥一分二釐開金針法凡開金針須擇吉日靜風日暖須待日午之時然後方靜坐片時定自己之氣息令人取木凳一條以綿被貼軟同患者坐於凳被上騎馬對坐面與我對平勿使高低緩緩用銅簮腳於開縫處點計之次看鋒針口與瞳仁三分之下要憑口訣使高低遠近方將鋒針令其入眼轉看數遍足了方按鋒針三四下看透了即取起有些血出用綿紙拭乾其血後方用地方令針緩緩拈訊若透此針取出然後依法用天字針再進取翳其翳若好撒開裹針緩緩收下停針畢方落在後去紙舉物與他看之即見不可與他人久視即用濕紙重重封固太陽用水膏塗之至次早方開看再換濕紙再封如此七日斜臥不可憑他翻身轉側七日後方開封與起無妨矣方取出金針看其翳不浮起即用濕紙封片時方去紙舉手動之眼科用藥次第法夫眼疾之醫雖分症類而其中病源不可不深思而熟視也夫疾有久新症有輕重須分表裡風熱氣熱濕熱實熱而新病者皆因內積熱毒之輕循經絡而上頭目遇外風寒所觸而發者必須先發表風邪後乃遠其火熱黃連黃芩以瀉火防風薄荷以疏風兼以麻黃蒼朮之類如無風寒所逼惟血壅上宜用大黃當歸防己墜下之劑久眼昏蒙所曉宜用當歸地黃防風羌活之類有翳膜加木賊蒺藜蟬蛻決明等劑如胞閣眼皮不開此乃寒邪之氣傷胞宜行氣之藥青皮黃耆香附兼以風藥佐之血滯者宜調血赤芍歸尾鼠黏如頭痛者羌活白芷蔓荊藁本川烏之類佐以風藥防風荊芥玄參柴胡細辛用之必當也如眼眩暈昏瞶十分作痛但虛腫痛及眼眶此乃痰飲所患宜服二陳湯兼佐以風藥如腫脹暗痛熱淚難禁者苦寒之藥宜然但視人之形氣虛實體之盛衰務究其內外淺深不可專書全在人之活法方書者乃前人立法之規使後無失其序如歸於症者則緩可以尋方倘暴發者變動於頃刻苟不明於藥性寒溫病勢之緩急而使之療非徒無益而反害之矣豫掇拾諸家之方贅成歌括六十餘首此平昔應驗之神方也若用意熟記則不思忖而瞭然矣若能知抽添之工夫加減之意趣真可謂眼科中之至寶哉後之學者當以豫之用心珍之重之俾術不輕而身不賤矣內障一書乃心授之法故不形於紙筆如若泛泛豈仁人君子哉金針眼科經驗方藥詩括酒調散歸及麻蒼赤芍菊甘羌大黃茺蔚桑螵共十味暴風腫痛用之良酒煎散內歸芎苓赤芍木通山梔仁龍膽大黃鬱金入防風加上效如神酒調洗肝有黑參知母大黃芩桔梗梔子朴硝共七味睛痛淚出用之痊四順當歸與大黃更兼甘草赤芍良不拘疾眼經年久一服交君便可康八正車前與瞿麥萹芎滑石山梔仁大黃木通同甘草燈心竹葉效如神雙解防風將軍芍薄荷芎歸草朴硝梔翹梗芩膏麻黃荊芥白朮滑石良當歸活血煎黃耆薄荷蒼朮麻黃宜川芎羌活菊花等熟黃荊芥沒藥醫大黃當歸散菊花薄荷黃芩川芎佳壅腫血凝生赤翳頻頻服藥再連渣七寶洗心當歸芍黃連荊芥及麻黃梔子大黃共七味眼疼赤痛正相當九仙飲治眼通紅赤芍當歸與木通白芷黃芩同甘草菊花荊芥與川芎治眼散有密蒙花歸菊荊蟬枝子加木賊防風甘草術更兼赤白芍無差蒼朮散能止昏淚夏枯木賊甘香附蒺藜白芷芎防風蟬蛻天蠶蔓荊助修肝散有當歸芩薄荷連翹山梔仁甘草防風加蜜烹肝虛目暗用之靈瀉肝散內有桔梗大黃知母與黑參朴硝黃芩連十味眼痛暴發霎時平加味修肝散芥歸菊花羌活甘蒺藜大黃連翹薄荷梗赤芍黃風莫改移涼隔連翹梔子仁大黃甘薄朴硝芩更加黃連赤芍藥服之熱毒化為塵茶調散內菊薄荷羌活川芎荊芥和石決石膏甘草少防風木賊去沉疴眼中淚出如何得四物補肝加木賊蒼朮防風白蒺藜川芎羌活甘草炙明目細辛藁本芎紅花歸蔓荊防風生黃椒茯麻根入羌活蒙花共奏功救苦湯內桔翹辛羌活川藁柴歸身龍膽知母荊防草黃芩連柏生地升撥雲菊花及蟬蛻白蒺川芎荊芥配羌活防風桑白皮掃除熱翳真無僞肝風沖眼淚昏蒙羌活黃耆及撫芎甘草蒺藜荊芥穗何愁翳膜障雙睛密蒙花散有菊花木賊石決明莫差白芍甘草白蒺藜細研為末用清茶連翹散內有黃芩羌活菊花草決明白蒺密蒙龍膽草更兼甘草去羞明川芎羌活治頭疼藁本細辛白芷增更有蔓荊防風佐教君一服便安寧暖肝湯內有防風茺蔚藁甘及川芎五味細辛知母等黃芩若治最多功省味修肝用當歸赤芍防風白蒺藜蟬蛻大黃川芎使更加木賊是其宜復明散內石決明茺蔚青葙甘蔓荊木賊人參夏枯草白芷芎蒺草決明人參羌活散獨活甘草茯苓桔梗芍枳殼天麻地骨皮柴胡前胡川芎藥洗心散內七般藥甘草當歸同芍藥荊芥蒼朮麻大黃眼腫服之如捻卻退赤散內有大黃黃連白芷赤芍詳當歸蒺藜蔥去白何愁淚出白如湯小菊花散只五味蒺藜木賊五味是羌活為末用茶調專治羞明並澀淚防風湯內用蟬蟲薄荷當歸及川芎羌活大黃梔子草熱沖眼目並頭風蟬花散內菊芩風羌活山梔白蒺芎木賊蔓荊決明子穀精荊芥草密蒙省風湯內有羚羊羌活黑參麻大黃知母當歸升桔梗密蒙甘草是奇方補血當歸熟地黃白朮芎芷白芍防車菊辛羌甘白茯桔梗茺蔚蒺大黃活血當歸散木通黃芩生地與撫芎白蒺當歸生梔子赤芍甘草菊花同破血當歸劉寄菊玄明赤芍紅蘇木黃芩歸尾羌連翹木賊甘草生地熟菩薩散藥只五味甘草防風白蒺藜蒼朮荊芥治羞明效若靈丹故名是明目流氣飲牛蒡荊玄梔藜細防風甘草大黃再添入眼中赤澀不來攻蔓荊散內有黃耆甘草人參白芍宜黃柏倍加將酒炒昏蒙虛氣用之宜川芎茶調散薄荷白芷防風甘草和更有細辛兼羌活荊茶同煎用者多助陽和血補氣湯甘草當歸白芷防蔓荊升麻柴胡使黃耆加上水煎嘗省風百解荊芥參甘草陳皮白茯苓殭蠶芎藭防風藿蟬蛻厚朴羌活葶散熱飲子用黃連防風羌活黃芩兼大黃當歸生地入腫痛暴發即時痊龍膽散有干菊花川芎香附木賊加草決明中加甘草迎風冷淚卻無些芎藭散內荊芥多甘草菊花及薄荷蒼朮一味米泔浸研為細末任調和神仙退翳羌活歸甘草蒙花荊賊藜地骨栝蔞蔓枳實椒連蟬菊薄蛇皮當歸龍膽升麻草赤芍柴胡五味藁羌活石膏同黃耆黃柏連翹酒炒好洗心眼散治退紅羌活升麻草木通梔子大黃赤芍藥黃芩九味湊防風偏正頭痛用清空黃連酒炒及川芎柴胡羌活黃芩草細辛少使配防風菊花茶調散川芎荊芥細辛草防風白芷薄荷羌活劑殭蠶蟬蛻治頭風打撲疹痘紅花散升麻生地羌活草大黃連翹赤芍藥更加當歸尾國老小防風湯梔子仁羌活甘草當歸身赤芍大黃水煎服小兒熱毒用之神小承氣湯薄荷蟬甘草杏仁及防風羌活天麻當歸是大黃赤芍水煎同菊花膏內用大黃荊芥黃芩術草蒼羌活防風黃連佐細辛為末蜜調嘗糖煎散有龍膽草防己防風同甘草赤芍川芎荊芥歸服之奇效如神好蟬花無比有茯苓羌活防風當歸身赤芍蒺藜同甘草川芎蒼朮草決明退翳撥雲黃連芩菊花龍膽羌活荊大黃石膏甘白芷石決防風草決明以上六十一方隨手作效丹藥和論對交丹四六丹可吹久年翳膜虛厚未堅實者不見人物者可三日一次九一丹解之其翳即消散如水厚薄至效如是對交四六不可用也後可用珍珠散間九一丹點之三七丹施於年久眼凡經曰翳不拘下生上上生下厚極者可二日一次以淡淡丹和解之二八丹理三五年發歇眼有紅絲略有疼痛癢澀共翳帶紅白色可一夜一次輕藥和之九一丹治眼時常發歇眼目生翳或疼痛可點若無疼痛只用清涼散間九一丹點之若有淡翳似飛雲霧者只用碧雲丹清涼散吹點又有一切冷眼不受寒藥者只用清涼散少加片腦入些姜粉時時點之效又有一切眼不受納藥者看去翳若去得將各樣膏丹少少調乳汁時時少少點之更不受者用淨三黃陽丹不用腦點亦能消翳吹雲膏亦可主之又有一樣受不得煎藥只將陽丹不用腦射硼砂點之又有一樣眼諸丹藥點不服將雞子檳榔磨冷水將雞翎點亦能退翳又有一樣眼不用丹藥將青鹽及食鹽火燒過冷水調雞毛點亦能退翳又有一樣眼人丟刺在眼不得出者將蔥捶碎敷之又將五倍子捶碎敷刺亦出又將蜣螂即噴屎蟲研碎敷之刺亦出煉爐甘石浸藥水方防風黃芩大黃當歸龍膽草黃柏各一兩生地黃羌活川芎白芷細辛菊花各八錢麻黃赤芍藥蒼朮木賊各六錢黃連一兩五錢荊芥五錢山梔子薄荷各七錢草烏以下新增柏子仁柴胡密蒙花上將二十四味俱選新鮮的細切如麻豆一咀用冷水四五碗銅盆內浸三四夜若春夏浸二宿秋五冬七日常以手擦過使其味出用細布濾過之煉爐甘石法其甘石須選帶隔又要輕或帶淡天青色可也打碎用燒過銀鍋內貯滿一仰一蓋頓丹爐內煉至極紅透鈐出淬藥水內其吃過藥傾撇仍將甘石置火內依前淬如此者三凡一次須煉及紅不透恐甘石變色黑淬三次已定將甘石打通碎又用新藥水浸一宿去火毒次日傾盡藥水曬乾研末有石者作一處無石者作一處異研又可將藥水濕過曬過研細極細絹篩過即為陽丹修合陰丹法煉過甘石四兩銅青七錢五分硇砂白的二錢半青鹽二錢半密陀僧一錢上將此五味用龍膽草及黃連二味浸過的水通將五味和勻濕過石禹碗內研得如泥至膩方可曬乾再研方入別藥又入六味黃連為末二錢五分細辛末去葉二錢草烏末二錢薄荷葉八分乳香制過一錢五分沒藥制過一錢合乳香製法在後上將此六味研至極細膩方入別諸藥後藥味硼砂明者一錢五分膽礬三分雄黃要黃明者七